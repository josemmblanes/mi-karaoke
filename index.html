<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>HSK Karaoke - Scanner & Editor Completo</title>
    <style>
        /* ESTILOS OPTIMIZADOS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f0f4f8; padding: 20px 16px 32px; color: #1e293b; }
        .app-container { max-width: 700px; margin: 0 auto; background: white; border-radius: 36px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 20px 20px 30px; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #c2410c, #7c2d12); background-clip: text; -webkit-background-clip: text; color: transparent; text-align: center; margin-bottom: 10px; }
        .sub { color: #5b6e8c; font-size: 0.8rem; margin-bottom: 24px; border-left: 3px solid #f97316; padding-left: 12px; }
        
        .select-group { background: #f8fafc; border-radius: 24px; padding: 16px; margin-bottom: 20px; }
        
        /* AJUSTES PARA LA APARIENCIA DE LA IMAGEN */
        .selector-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .selector-row label { font-weight: 600; width: 80px; font-size: 1rem; color: #334155; display: flex; align-items: center; gap: 8px; }
        
        select { background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; font-size: 1rem; cursor: pointer; color: #1e293b; }
        
        /* BOTONES ESPECÍFICOS */
        .btn-scan { background: #2563eb; color: white; width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; border: none; margin-bottom: 15px; cursor: pointer; }
        
        .btn-load { background: #f97316; color: white; flex: 1; padding: 14px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
        
        .btn-trans { background: #fff7ed; color: #f97316; border: 1px solid #ffedd5; flex: 1; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-trans.active { background: #ffedd5; border-color: #f97316; }

        /* NUEVA FILA DE EDICIÓN Y SINCRONIZACIÓN */
        .editor-sync-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-editor { background: #a855f7; color: white; flex: 2; padding: 14px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
        .btn-sync-fix { background: #ef4444; color: white; flex: 1; padding: 14px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 0.85rem; }

        /* ESTADO ABAJO */
        .status-bar { background: #f1f5f9; border-radius: 8px; padding: 12px; margin-top: 20px; border-left: 4px solid #1e293b; font-size: 0.9rem; color: #475569; }

        button:active { opacity: 0.8; transform: scale(0.98); }

        .player-card { margin: 16px 0; padding: 16px 12px; }
        .audio-info { background: #f1f5f9; border-radius: 60px; padding: 10px 16px; margin-bottom: 16px; font-size: 0.8rem; text-align: center; word-break: break-all; }
        .transcript-area { background: #fefce8; border-radius: 24px; padding: 20px 16px; min-height: 280px; border: 2px solid #fde68a; display: inline-block; width: auto; min-width: 100%; box-sizing: border-box; }
        .karaoke-word { display: inline-block; border-radius: 10px; padding: 2px 3px; margin: 0 1px; font-size: 1.2rem; cursor: pointer; transition: background 0.1s; }
        .karaoke-word.active { background-color: #fbbf24; font-weight: 600; }
        
        textarea { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid #cbd5e1; font-family: monospace; font-size: 0.9rem; margin-top: 8px; }
        footer { font-size: 0.7rem; text-align: center; margin-top: 24px; color: #94a3b8; }
        .dialogue-line { display: block; margin-bottom: 6px; line-height: 1.6; }
        .speaker-label { font-weight: 800; color: #1e293b; margin-right: 6px; display: inline-block; font-size: 1.2rem; }
        .translation-container { margin-top: 30px; padding-top: 25px; border-top: 2px dashed #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
        .translation-line { font-style: normal; color: #334155; font-size: 1.1rem; line-height: 1.5; white-space: pre-line; }
        
        /* Estilos del modal tipo carpeta (primera imagen) */
        .modal-folder-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .modal-folder-container {
            background: white;
            width: 90%;
            max-width: 520px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .modal-folder-header {
            padding: 18px 20px 8px 20px;
            font-weight: 600;
            font-size: 1.2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
        }
        .modal-folder-body {
            padding: 20px;
        }
        .url-input-group {
            margin-bottom: 24px;
        }
        .url-input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }
        .url-input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.9rem;
            background: #ffffff;
            transition: 0.2s;
        }
        .url-input-group input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        .folder-preview-area {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0 8px;
            font-size: 0.8rem;
            color: #475569;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-folder-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
        }
        .btn-modal-subir {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-modal-cancel {
            background: #e2e8f0;
            color: #1e293b;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        /* Confirmación estilo tercera imagen */
        .confirm-upload-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .confirm-card {
            background: white;
            width: 300px;
            border-radius: 24px;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        .confirm-card p {
            font-size: 1rem;
            margin-bottom: 24px;
            line-height: 1.4;
            color: #1e293b;
        }
        .confirm-card-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .confirm-yes {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .confirm-no {
            background: #e2e8f0;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        /* contenedor para que el transcript se ajuste al contenido */
        .transcript-wrapper {
            display: inline-block;
            width: auto;
            max-width: 100%;
        }
        #transcriptContainer {
            display: inline-block;
            width: auto;
            min-width: 100%;
        }
    </style>
</head>

<div class="app-container">
    <h1>🎧 HSK Karaoke</h1>
    <div class="sub">✨ Aplicación para practicar el 听力.</div>

        </div>
        <div class="selector-row">
            <label>🎙️ Audio</label>
            <select id="audioSelect" style="flex: 1;"><option value="">--</option></select>
            <button id="loadAudioBtn" class="btn-load" style="flex: 0.6; padding: 10px; font-size: 0.9rem;">▶️ Cargar</button>
        </div>
        
        <div class="selector-row" style="flex-wrap: wrap; gap: 6px;">
            <button id="toggleTranslationBtn" class="btn-trans" style="flex: 1; min-width: 120px;">📖 Mostrar traducción</button>
            <button id="togglePinyinBtn" class="btn-trans" style="flex: 1; min-width: 120px;">🔤 Mostrar pinyin</button>
        </div>

        <div class="editor-sync-row">
            <button id="showEditorBtn" class="btn-editor">📝 Edición avanzada</button>
            <button id="syncFixBtn" class="btn-sync-fix">⚡ Sincronizar</button>
        </div>
    </div>

    <div class="status-bar" id="audioInfo">📌 Estado: Cargando audios...</div>

    <div class="player-card">
        <audio id="audioPlayer" controls style="width:100%; border-radius: 40px; margin-bottom: 15px;"></audio>
        <div class="transcript-wrapper">
            <div class="transcript-area" id="transcriptContainer"></div>
        </div>
    </div>
    
    <footer>💾 Sus ediciones sobreescriben los datos originales de forma permanente.</footer>
</div>

"1_5_3": { "zh": "女: 小猫 在 哪儿?\n男: 小猫 在 那儿。\n女: 小狗 在 哪儿?\n男: 小狗 在 椅子 下面。", "es": "Mujer: ¿Dónde está el gatito?\nHombre: El gatito está allí.\nMujer: ¿Dónde está el perrito?\nHombre: El perrito está debajo de la silla.", "pinyin": "nǚ: xiǎo māo zài nǎ ér?\nnán: xiǎo māo zài nà ér.\nnǚ: xiǎo gǒu zài nǎ ér?\nnán: xiǎo gǒu zài yǐ zi xià miàn." },
"1_5_4": { "zh": "女: 你 在 哪儿 工作?\n男: 我 在 学校 工作。\n女: 你 儿子 在 哪儿 工作?\n男: 我 儿子 在 医院 工作, 他 是 医生。", "es": "Mujer: ¿Dónde trabajas?\nHombre: Trabajo en la escuela.\nMujer: ¿Dónde trabaja tu hijo?\nHombre: Mi hijo trabaja en el hospital, es médico.", "pinyin": "nǚ: nǐ zài nǎ ér gōng zuò?\nnán: wǒ zài xué xiào gōng zuò.\nnǚ: nǐ ér zi zài nǎ ér gōng zuò?\nnán: wǒ ér zi zài yī yuàn gōng zuò, tā shì yī shēng." },
"1_5_5": { "zh": "女: 这儿 有 人 吗?\n男: 没有。\n女: 我 能 坐 这儿 吗?\n男: 请坐。", "es": "Mujer: ¿Aquí hay alguien?\nHombre: No hay.\nMujer: ¿Me puedo sentar aquí?\nHombre: Por favor, siéntate.", "pinyin": "nǚ: zhè ér yǒu rén ma?\nnán: méi yǒu.\nnǚ: wǒ néng zuò zhè ér ma?\nnán: qǐng zuò." },
"1_6_1": { "zh": "女: 你 想 喝 什么?\n男: 我 想 喝 茶。\n女: 你 想 吃 什么?\n男: 我 想 吃 米饭。", "es": "Mujer: ¿Qué quieres beber?\nHombre: Quiero beber té.\nMujer: ¿Qué quieres comer?\nHombre: Quiero comer arroz.", "pinyin": "nǚ: nǐ xiǎng hē shén me?\nnán: wǒ xiǎng hē chá.\nnǚ: nǐ xiǎng chī shén me?\nnán: wǒ xiǎng chī mǐ fàn." },
"1_6_2": { "zh": "男: 下午 你 想 做 什么?\n女: 下午 我 想 去 商店。\n男: 你 想 买 什么?\n女: 我 想 买 一个 杯子。", "es": "Hombre: ¿Qué quieres hacer por la tarde?\nMujer: Por la tarde quiero ir a la tienda.\nHombre: ¿Qué quieres comprar?\nMujer: Quiero comprar un vaso.", "pinyin": "nán: xià wǔ nǐ xiǎng zuò shén me?\nnǚ: xià wǔ wǒ xiǎng qù shāng diàn.\nnán: nǐ xiǎng mǎi shén me?\nnǚ: wǒ xiǎng mǎi yí gè bēi zi." },
"1_6_3": { "zh": "女: 你好! 这个 杯子 多少 钱?\n男: 二十八 块。\n女: 那个 杯子 多少 钱?\n男: 那个 杯子 十八 块钱。", "es": "Mujer: ¡Hola! ¿Cuánto cuesta este vaso?\nHombre: Veintiocho yuanes.\nMujer: ¿Cuánto cuesta aquel vaso?\nHombre: Aquel vaso cuesta dieciocho yuanes.", "pinyin": "nǚ: nǐ hǎo! zhè ge bēi zi duō shao qián?\nnán: èr shí bā kuài.\nnǚ: nà ge bēi zi duō shao qián?\nnán: nà ge bēi zi shí bā kuài qián." },
"1_7_1": { "zh": "女: 请问, 今天 几号?\n男: 今天 9月1号。\n女: 今天 星期几?\n男: 星期三。", "es": "Mujer: Disculpe, ¿qué día del mes es hoy?\nHombre: Hoy es 1 de septiembre.\nMujer: ¿Qué día de la semana es hoy?\nHombre: Miércoles.", "pinyin": "nǚ: qǐng wèn, jīn tiān jǐ hào?\nnán: jīn tiān jiǔ yuè yī hào.\nnǚ: jīn tiān xīng qī jǐ?\nnán: xīng qī sān." },
"1_7_2": { "zh": "男: 昨天 是 几月几号?\n女: 昨天 是 8月31号, 星期二。\n男: 明天 呢?\n女: 明天 是 9月2号, 星期四。", "es": "Hombre: ¿Qué fecha fue ayer?\nMujer: Ayer fue 31 de agosto, martes.\nHombre: ¿Y mañana?\nMujer: Mañana es 2 de septiembre, jueves.", "pinyin": "nán: zuó tiān shì jǐ yuè jǐ hào?\nnǚ: zuó tiān shì bā yuè sān shí yī hào, xīng qī èr.\nnán: míng tiān ne?\nnǚ: míng tiān shì jiǔ yuè èr hào, xīng qī sì." },
"1_7_3": { "zh": "女: 现在 几点?\n男: 现在 十点十分。\n女: 中午 几点 吃饭?\n男: 十二点 吃饭。", "es": "Mujer: ¿Qué hora es?\nHombre: Son las diez y diez.\nMujer: ¿A qué hora comemos al mediodía?\nHombre: Comemos a las doce.", "pinyin": "nǚ: xiàn zài jǐ diǎn?\nnán: xiàn zài shí diǎn shí fēn.\nnǚ: zhōng wǔ jǐ diǎn chī fàn?\nnán: shí èr diǎn chī fàn." },
"1_7_4": { "zh": "女: 小张, 你 家 有 几个 人?\n男: 我 家 有 六个 人。", "es": "Mujer: Xiao Zhang, ¿cuántas personas hay en tu familia?\nHombre: En mi familia hay seis personas.", "pinyin": "nǚ: xiǎo zhāng, nǐ jiā yǒu jǐ ge rén?\nnán: wǒ jiā yǒu liù ge rén." },
"1_7_5": { "zh": "A: 你 女儿 几岁?\nB: 她 1今年 四岁了。", "es": "A: ¿Cuántos años tiene tu hija?\nB: Ella tiene cuatro años este año.", "pinyin": "A: nǐ nǚ ér jǐ suì?\nB: tā jīn nián sì suì le." },
"1_8_1": { "zh": "女: 你 会 说 汉语 吗?\n男: 我 会 说 汉语。\n女: 你 妈妈 会 说 汉语 吗?\n男: 她 不会 说。", "es": "Mujer: ¿Sabes hablar chino?\nHombre: Sé hablar chino.\nMujer: ¿Tu madre sabe hablar chino?\nHombre: No sabe.", "pinyin": "nǚ: nǐ huì shuō hàn yǔ ma?\nnán: wǒ huì shuō hàn yǔ.\nnǚ: nǐ mā ma huì shuō hàn yǔ ma?\nnán: tā bú huì shuō." },
"1_8_2": { "zh": "男: 中国菜 好吃 吗?\n女: 中国菜 很 好吃。\n男: 你 会 做 中国菜 吗?\n女: 我 不会 做。", "es": "Hombre: ¿Está buena la comida china?\nMujer: La comida china está muy buena.\nHombre: ¿Sabes hacer comida china?\nMujer: No sé hacerla.", "pinyin": "nán: zhōng guó cài hǎo chī ma?\nnǚ: zhōng guó cài hěn hǎo chī.\nnán: nǐ huì zuò zhōng guó cài ma?\nnǚ: wǒ bú huì zuò." },
"1_8_3": { "zh": "女: 你 会 写 汉字 吗?\n男: 我 会 写。\n女: 这个 字 怎么 写?\n男: 对不起, 这个 字 我 会 读, 不会 写。", "es": "Mujer: ¿Sabes escribir caracteres chinos?\nHombre: Sé escribirlos.\nMujer: ¿Cómo se escribe este carácter?\nHombre: Lo siento, sé leer este carácter, pero no escribirlo.", "pinyin": "nǚ: nǐ huì xiě hàn zì ma?\nnán: wǒ huì xiě.\nnǚ: zhè ge zì zěn me xiě?\nnán: duì bù qǐ, zhè ge zì wǒ huì dú, bú huì xiě." },
"1_8_4": { "zh": "男: 明天 星期六, 你 去 学校 吗?\n女: 我 去 学校。\n男: 你 去 学校 做 什么?\n女: 我 去 学校 看书。", "es": "Hombre: Mañana es sábado, ¿vas a la escuela?\nMujer: Voy a la escuela.\nHombre: ¿Qué vas a hacer a la escuela?\nMujer: Voy a la escuela a leer libros.", "pinyin": "nán: míng tiān xīng qī liù, nǐ qù xué xiào ma?\nnǚ: wǒ qù xué xiào.\nnán: nǐ qù xué xiào zuò shén me?\nnǚ: wǒ qù xué xiào kàn shū." },
"1_9_1": { "zh": "女: 桌子 上 有  什么?\n男: 桌子 上 有 一个 电脑 和 一本书。", "es": "Mujer: ¿Qué hay encima de la mesa?\nHombre: Encima de la mesa hay un ordenador y un libro.", "pinyin": "nǚ: zhuō zi shàng yǒu shén me?\nnán: zhuō zi shàng yǒu yí gè diàn nǎo hé yī běn shū." },
"1_9_2": { "zh": "女: 爸爸 什么时候 回家?\n男: 下午 5点。\n女: 我们 什么时候 去 看电影?\n男: 6点30分。", "es": "Mujer: ¿Cuándo vuelve papá a casa?\nHombre: A las 5 de la tarde.\nMujer: ¿Cuándo vamos a ir a ver la película?\nHombre: El lunes voy a Pekín.", "pinyin": "nǚ: bà ba shén me shí hou huí jiā?\nnán: xià wǔ wǔ diǎn.\nnǚ: wǒ men shén me shí hou qù kàn diàn yǐng?\nnán: liù diǎn sān shí fēn." },
"1_9_3": { "zh": "男: 我 星期一 去 北京。\n女: 你 想 在 北京 住 几天?\n男: 住 三天。\n女: 星期五 前 能 回家 吗?\n男: 能。", "es": "Hombre: El lunes voy a Pekín.\nMujer: ¿Cuántos días quieres estar en Pekín?\nHombre: Me quedo tres días.\nMujer: ¿Puedes volver a casa antes del viernes?\nHombre: Sí, puedo.", "pinyin": "nán: wǒ xīng qī yī qù běi jīng.\nnǚ: nǐ xiǎng zài běi jīng zhù jǐ tiān?\nnán: zhù sān tiān.\nnǚ: xīng qī wǔ qián néng huí jiā ma?\nnán: néng." },
"1_10_1": { "zh": "女: 昨天 上午 你 去 哪儿了?\n男: 我 去 商店 买东西 了。\n女: 你 买 什么 了?\n男: 我 买 一点儿 苹果。", "es": "Mujer: ¿A dónde fuiste ayer por la mañana?\nHombre: Fui a la tienda a comprar cosas.\nMujer: ¿Qué compraste?\nHombre: Compré un poco de manzanas.", "pinyin": "nǚ: zuó tiān shàng wǔ nǐ qù nǎ ér le?\nnán: wǒ qù shāng diàn mǎi dōng xi le.\nnǚ: nǐ mǎi shén me le?\nnán: wǒ mǎi yī diǎn er píng guǒ." },
"1_10_2": { "zh": "女: 你 看见 张先生 了 吗?\n男: 看见 了, 他 去 学开车 了。\n女: 他 什么时候 能 回来?\n男: 四十分钟 后 回来。", "es": "Mujer: ¿Viste al señor Zhang?\nHombre: Lo vi. Fue a aprender a conducir.\nMujer: ¿Cuándo puede volver?\nHombre: Vuelve en cuarenta minutos.", "pinyin": "nǚ: nǐ kàn jiàn zhāng xiān sheng le ma?\nnán: kàn jiàn le, tā qù xué kāi chē le.\nnǚ: tā shén me shí hou néng huí lái?\nnán: sì shí fēn zhōng hòu huí lái." },
"1_10_3": { "zh": "女: 喂, 你 回家 了?\n男: 喂, 我 在 出租车 上. 我 去 学校。", "es": "Mujer: Hola, ¿has vuelto a casa?\nHombre: Hola, estoy en el taxi. Voy a la escuela.", "pinyin": "nǚ: wèi, nǐ huí jiā le?\nnán: wèi, wǒ zài chū zū chē shàng. wǒ qù xué xiào." },
"1_10_4": { "zh": "女: 昨天 北京 的 天气 怎么样?\n男: 太热了。\n女: 明天 呢? 明天 天气 怎么样?\n男: 明天 天气 很 好, 不冷 不热。", "es": "Mujer: ¿Qué tiempo hizo ayer en Pekín?\nHombre: Demasiado calor.\nMujer: ¿Y mañana? ¿Qué tiempo hará mañana?\nHombre: Mañana hará muy buen tiempo. Ni frío ni calor.", "pinyin": "nǚ: zuó tiān běi jīng de tiān qì zěn me yàng?\nnán: tài rè le.\nnǚ: míng tiān ne? míng tiān tiān qì zěn me yàng?\nnán: míng tiān tiān qì hěn hǎo, bù lěng bù rè." },
"1_10_5": { "zh": "女: 我们 中午 去 买. 好 吗?\n男: 你 看. 我 没(有) 钱 了!", "es": "Mujer: Vamos a comprar al mediodía. ¿Vale?\nHombre: ¡Mira! ¡Ya no tengo dinero!", "pinyin": "nǚ: wǒ men zhōng wǔ qù mǎi. hǎo ma?\nnán: nǐ kàn. wǒ méi yǒu qián le!" },
"1_10_6": { "zh": "男: 下雨 了!\n女: 我 看见 了。", "es": "Hombre: ¡Está lloviendo!\nMujer: Ya lo he visto.", "pinyin": "nán: xià yǔ le!\nnǚ: wǒ kàn jiàn le." },
"1_10_7": { "zh": "男: 你 在 那儿 做 什么 呢?\n女: 我 在 看书 呢。", "es": "Hombre: ¿Qué estás haciendo allí?\nMujer: Estoy leyendo.", "pinyin": "nán: nǐ zài nà ér zuò shén me ne?\nnǚ: wǒ zài kàn shū ne." },

// NIVEL 2
"2_1_1": { "zh": "男: 我 要 去 北京 旅游, 你 觉得 什么时候 去 最好?\n女: 九月 去 北京 旅游 最好。\n男: 为什么?\n女: 九月 的 北京 天气 不冷 也 不热。", "es": "Hombre: Voy a ir de viaje a Pekín, ¿cuándo crees que es mejor ir?\nMujer: Ir a Pekín en septiembre es lo mejor.\nHombre: ¿Por qué?\nMujer: En septiembre, el clima de Pekín no es frío ni caluroso.", "pinyin": "nán: wǒ yào qù běi jīng lǚ yóu, nǐ jué de shén me shí hou qù zuì hǎo?\nnǚ: jiǔ yuè qù běi jīng lǚ yóu zuì hǎo.\nnán: wèi shén me?\nnǚ: jiǔ yuè de běi jīng tiān qì bù lěng yě bù rè." },
"2_1_2": { "zh": "女: 你 喜欢 什么 运动?\n男: 我 最喜欢 踢足球。\n女: 下午 我们 一起 去 踢足球 吧。\n男: 好 啊!", "es": "Mujer: ¿Qué deporte te gusta?\nHombre: El que más me gusta es jugar al fútbol.\nMujer: Vamos a jugar al fútbol juntos esta tarde.\nHombre: ¡Vale!", "pinyin": "nǚ: nǐ xǐ huān shén me yùn dòng?\nnán: wǒ zuì xǐ huān tī zú qiú.\nnǚ: xià wǔ wǒ men yī qǐ qù tī zú qiú ba.\nnán: hǎo a!" },
"2_1_3": { "zh": "男: 桌子 下面 有 个 猫。\n女: 那 是 系统的 猫, 它 叫 花花。\n男: 它 很 漂亮。\n女: 是a, 我 觉得 系统的 猫 最 漂亮。\n男: 它 多大 了?\n女: 六个 多月。", "es": "Hombre: Hay un gato debajo de la mesa.\nMujer: Ese es mi gato, se llama Huahua.\nHombre: Es muy bonito.\nMujer: Sí, creo que sus ojos son lo más bonito.\nHombre: ¿Cuántos años tiene?\nMujer: Más de seis meses.", "pinyin": "nán: zhuō zi xià miàn yǒu gè māo.\nnǚ: nà shì wǒ de māo, tā jiào huā huā.\nnán: tā hěn piào liang.\nnǚ: shì a, wǒ jué de wǒ de māo zuì piào liang.\nnán: tā duō dà le?\nnǚ: liù ge duō yuè." },
"2_1_4": { "zh": "女: 你 很少 生病, 是是不是 喜欢 运动?\n男: 是啊, 我 每天早上 都 要 出去 跑步。\n女: 你 每天 几点 起床?\n男: 我 每天 六点 起床。", "es": "Mujer: Rara vez te enfermas, ¿es porque te gusta hacer deporte?\nHombre: Sí, salgo a correr todas las mañanas.\nMujer: ¿A qué hora te levantas cada día?\nHombre: Me levanto a las seis todos los días.", "pinyin": "nǚ: nǐ hěn shǎo shēng bìng, shì bú shì xǐ huān yùn dòng?\nnán: shì a, wǒ měi tiān zǎo shang dōu yào chū qù pǎo bù.\nnǚ: nǐ měi tiān jǐ diǎn qǐ chuáng?\nnán: wǒ měi tiān liù diǎn qǐ chuáng." },
"2_2_1": { "zh": "女: 这块 手表 是 个人 的 吗?\n男: 不是 系统的. 是 我 爸爸 的。\n女: 多少 钱 买的?\n男: 三千 多块。", "es": "Mujer: ¿Es tuyo este reloj?\nHombre: No es mío. Es de mi padre.\nMujer: ¿Cuánto costó?\nHombre: Más de tres mil yuanes.", "pinyin": "nǚ: zhè kuài shǒu biǎo shì nǐ de ma?\nnán: bú shì wǒ de. shì wǒ bà ba de.\nnǚ: duō shao qián mǎi de?\nnán: sān qiān duō kuài." },
"2_2_2": { "zh": "男: 你 看见 我的 杯子 了 吗?\n女: 这里 有 几个 杯子, 哪个 是 系统的?\n男: 左边 那个 红色 的 是 系统的。\n女: 给你。", "es": "Hombre: ¿Has visto mi vaso?\nMujer: Aquí hay varios vasos, ¿cuál es el tuyo?\nHombre: El rojo de la izquierda es el mío.\nMujer: Aquí tienes.", "pinyin": "nán: nǐ kàn jiàn wǒ de bēi zi le ma?\nnǚ: zhè lǐ yǒu jǐ ge bēi zi, nǎ ge shì nǐ de?\nnán: zuǒ bian nà ge hóng sè de shì wǒ de.\nnǚ: gěi nǐ." },
"2_2_3": { "zh": "女: 你 喜欢 踢足球 吗?\n男: 非常 喜欢。\n女: 你 是什么 时候 开始 踢足球 的?\n男: 我 十一岁 的 时候 开始 踢足球, 已经 踢了 十年 了。", "es": "Mujer: ¿Te gusta jugar al fútbol?\nHombre: Me gusta muchísimo.\nMujer: ¿Cuándo empezaste a jugar al fútbol?\nHombre: Empecé a jugar cuando tenía once años, ya llevo diez años jugando.", "pinyin": "nǚ: nǐ xǐ huān tī zú qiú ma?\nnán: fēi cháng xǐ huān.\nnǚ: nǐ shì shén me shí hou kāi shǐ tī zú qiú de?\nnán: wǒ shí yī suì de shí hou kāi shǐ tī zú qiú, yǐ jīng tī le shí nián le." },
"2_2_4": { "zh": "男: 今天 去不去 打球?\n女: 这两天 有点儿 累, 不去 打球 了。\n男: 你 在 做什么 呢? 是 在 想 昨天 的 考试 吗?\n女: 是啊, 我 觉得 听 和 说 还可以, 读 和 写 不好, 很多 字 我 都 不知道 是什么 意思。", "es": "Hombre: ¿Para ir a jugar hoy?\nMujer: Estos dos días he estado un poco cansada, ya no voy a ir.\nHombre: ¿Qué estás haciendo? ¿Estás pensando en el examen de ayer?\nMujer: Sí, creo que escuchar y hablar están bien, pero leer y escribir no se me dan bien; muchos caracteres no sé qué significan.", "pinyin": "nán: jīn tiān qù bú qù dǎ qiú?\nnǚ: zhè liǎng tiān yǒu diǎn er lèi, bú qù dǎ qiú le.\nnán: nǐ zài zuò shén me ne? shì zài xiǎng zuó tiān de kǎo shì ma?\nnǚ: shì a, wǒ jué de tīng hé shuō hái kě yǐ, dú hé xiě bù hǎo, hěn duō zì wǒ dōu bù zhī dào shì shén me yì si." },
"2_3_1": { "zh": "女: 你 知道 小王 今天 什么时候 来 学校 吗?\n男: 他 已经 来了。\n女: 你 怎么 知道 他 来了?\n男: 我 在 门外 看见 他的 自行车 了。", "es": "Mujer: ¿Sabes a qué hora viene Xiao Wang hoy a la escuela?\nHombre: Ya ha llegado.\nMujer: ¿Cómo sabes que ha llegado?\nHombre: He visto su bicicleta fuera de la puerta.", "pinyin": "nǚ: nǐ zhī dào xiǎo wáng jīn tiān shén me shí hou lái xué xiào ma?\nnán: tā yǐ jīng lái le.\nnǚ: nǐ zěn me zhī dào tā lái le?\nnán: wǒ zài mén wài kàn jiàn tā de zì xíng chē le." },
"2_3_2": { "zh": "男: 今天 的 羊肉 很 好吃, 你 怎么 不 吃了?\n女: 这个 星期 天天 都 吃 羊肉, 不想 吃了。\n男: 那 你 还想 吃  什么?\n女: 来 一点儿 面条 吧。", "es": "Hombre: El cordero de hoy está muy rico, ¿por qué no comes más?\nMujer: He comido cordero todos los días de esta semana, ya no quiero más.\nHombre: Entonces, ¿qué más quieres comer?\nMujer: Tráeme un poco de fideos.", "pinyin": "nán: jīn tiān de yáng ròu hěn hǎo chī, nǐ zěn me bù chī le?\nnǚ: zhè ge xīng qī tiān tiān dōu chī yáng ròu, bù xiǎng chī le.\nnán: nà nǐ hái xiǎng chī shén me?\nnǚ: lái yī diǎn er miàn tiáo ba." },
"2_3_3": { "zh": "男: 昨天 你们 怎么 都 没去 打篮球?\n女: Porque 昨天 下雨, 所以 我们 都 没去. 我 去 游泳 了。\n男: 你 经常 游泳 吗?\n女: 这个 月 我 天天 游泳, 我 现在  公斤 了。", "es": "Hombre: ¿Por qué no fueron ayer a jugar al baloncesto?\nMujer: Porque ayer llovió, por eso no fuimos. Yo fui a nadar.\nHombre: ¿Nadas a menudo?\nMujer: Este mes he nadado todos los días, ahora peso setenta kilos.", "pinyin": "nán: zuó tiān nǐ men zěn me dōu méi qù dǎ lán qiú?\nnǚ: yīn wèi zuó tiān xià yǔ, suǒ yǐ wǒ men dōu méi qù. wǒ qù yóu yǒng le.\nnán: nǐ jīng cháng yóu yǒng ma?\nnǚ: zhè ge yuè wǒ tiān tiān yóu yǒng, wǒ xiàn zài qī shí gōng jīn le." },
"2_3_4": { "zh": "女: 你 现在 在 哪儿 呢?\n男: 在 去 机场 的 路上. 你 已经 到了 吗?\n女: 我 下飞机 了. 你 还有 多长 时间 能 到 这儿?\n男: 二十 分钟 就 到。", "es": "Mujer: ¿Dónde estás ahora?\nHombre: En camino al aeropuerto. ¿Ya has llegado?\nMujer: Ya bajé del avión. ¿Cuánto tiempo te falta para llegar aquí?\nHombre: Llego en veinte minutos.", "pinyin": "nǚ: nǐ xiàn zài zài nǎ ér ne?\nnán: zài qù jī chǎng de lù shàng. nǐ yǐ jīng dào le ma?\nnǚ: wǒ xià fēi jī le. nǐ hái yǒu duō cháng shí jiān néng dào zhè ér?\nnán: èr shí fēn zhōng jiù dào." },
"2_4_1": { "zh": "男: 晚上 我们 去 饭馆 吃饭, 怎么样?\n女: 我 不想 去 外面 吃, 我 想 在 家 吃。\n男: 那 你 准备 做 什么 呢?\n女: 就 做 你 爱吃 的 鱼 吧。", "es": "Hombre: ¿Qué tal si vamos a cenar a un restaurante esta noche?\nMujer: No quiero salir a comer fuera, quiero comer en casa.\nHombre: Entonces, ¿qué vas a preparar?\nMujer: Haré el pescado que tanto te gusta.", "pinyin": "nán: wǎn shàng wǒ men qù fàn guǎn chī fàn, zěn me yàng?\nnǚ: wǒ bù xiǎng qù wài miàn chī, wǒ xiǎng zài jiā chī.\nnán: nà nǐ zhǔn bèi zuò shén me ne?\nnǚ: jiù zuò nǐ ài chī de yú ba." },
"2_4_2": { "zh": "女: 帮 我 看一下 这件 衣服 怎么样。\n男: 颜色 还可以, 就是 有点儿 大。\n女: 这件 小 的 怎么样?\n男: 这件 不错, 就  买 这件 吧。", "es": "Mujer: Ayúdame a ver qué tal me queda esta ropa.\nHombre: El color está bien, pero es un poco grande.\nMujer: ¿Qué tal esta pequeña?\nHombre: Esta no está mal, compra esta.", "pinyin": "nǚ: bāng wǒ kàn yī xià zhè jiàn yī fu zěn me yàng.\nnán: yán sè hái kě yǐ, jiù shì yǒu diǎn er dà.\nnǚ: zhè jiàn xiǎo de zěn me yàng?\nnán: zhè jiàn bú cuò, jiù mǎi zhè jiàn ba." },
"2_4_3": { "zh": "女: 休息 一下吧, 喝 咖啡 吗?\n男: 不 喝了, 我 已经 喝 两杯 了。\n女: 是啊, 咖啡 喝多了 对 身体 不好。\n男: 以后 我 少喝 一点儿, 每天 喝 一杯。", "es": "Mujer: Descansemos un poco, ¿quieres café?\nHombre: No, ya me he tomado dos tazas.\nMujer: Es cierto, beber demasiado café no es bueno para la salud.\nHombre: En el futuro beberé menos, una taza al día.", "pinyin": "nǚ: xiū xi yī xià ba, hē kā fēi ma?\nnán: bù hē le, wǒ yǐ jīng hē liǎng bēi le.\nnǚ: shì a, kā fēi hē duō le duì shēn tǐ bù hǎo.\nnán: yǐ hòu wǒ shǎo hē yī diǎn er, měi tiān hē yī bēi." },
"2_4_4": { "zh": "男: 不要 看  电视 了, 明天 上午 还有 汉语 课 呢。\n女: 看 电视 对 学 汉语 有 帮助。\n男: 明天 的 课 你 都 准备好 了 吗?\n女: 都 准备好 了。", "es": "Hombre: Deja de ver la televisión, mañana por la mañana tienes clase de chino.\nMujer: Ver la televisión ayuda a aprender chino.\nHombre: ¿Has preparado ya toda la clase de mañana?\nMujer: Ya está todo preparado.", "pinyin": "nán: bú yào kàn diàn shì le, míng tiān shàng wǔ hái yǒu hàn yǔ kè ne.\nnǚ: kàn diàn shì duì xué hàn yǔ yǒu bāng zhù.\nnán: míng tiān de kè nǐ dōu zhǔn bèi hǎo le ma?\nnǚ: dōu zhǔn bèi hǎo le." },
"2_5_1": { "zh": "男: 昨天 和 你 一起 唱歌 的 人 是 谁?\n女: 一个 朋友。\n男:  朋友? 是不是 男朋友?\n女: 不是 不是, 我 同学 介绍 的, 昨天 第一次 见。", "es": "Hombre: ¿Quién era la persona que estaba cantando contigo ayer?\nMujer: Un amigo.\nHombre: ¿Qué amigo? ¿Es tu novio?\nMujer: No, no, me lo presentó un compañero de clase, ayer lo vi por primera vez.", "pinyin": "nán: zuó tiān hé nǐ yī qǐ chàng gē de rén shì shuí?\nnǚ: yí gè péng you.\nnán: péng you? shì bú shì nán péng you?\nnǚ: bú shì bú shì, wǒ tóng xué jiè shào de, zuó tiān dì yī cì jiàn." },
"2_5_2": { "zh": "男: 左边 这个 看 报纸 的 女孩子 是 你 姐姐 吗?\n女: 是, 右边 写字 的 那个人 是 我 哥哥。\n男: 你 哥哥 多大?\n女: 25岁, 他 比 我 大 三岁。", "es": "Hombre: ¿La chica de la izquierda que lee el periódico es tu hermana mayor?\nMujer: Sí, y la persona de la derecha que está escribiendo es mi hermano mayor.\nHombre: ¿Qué edad tiene tu hermano?\nMujer: 25 años, es tres años mayor que yo.", "pinyin": "nán: zuǒ bian zhè ge kàn bào zhǐ de nǚ hái zi shì nǐ jiě jie ma?\nnǚ: shì, yòu bian xiě zì de nà ge rén shì wǒ gē ge.\nnán: nǐ gē ge duō dà?\nnǚ: èr shí wǔ suì, tā bǐ wǒ dà sān suì." },
"2_5_3": { "zh": "男: 今天 的 西瓜  卖?\n女: 三块五 一斤。\n男: 比 昨天 便宜。\n女: 是, 苹果 也 比 昨天 便宜 一些, 您 来点儿 吧。", "es": "Hombre: ¿A cómo se vende la sandía hoy?\nMujer: A 3,5 yuanes el medio kilo.\nHombre: Más barato que ayer.\nMujer: Sí, las manzanas también están un poco más baratas que ayer, llévese algunas.", "pinyin": "nán: jīn tiān de xī guā zěn me mài?\nnǚ: sān kuài wǔ yī jīn.\nnán: bǐ zuó tiān pián yi.\nnǚ: shì, píng guǒ yě bǐ zuó tiān pián yi yī xiē, nín lái diǎn er ba." },
"2_5_4": { "zh": "女: 你 每天早上 几点 起床?\n男: 六点 多。\n女: 你 比 我 早起 一个 小时。\n男: 我 睡得 也 早, 我 每天晚上 10点 就 睡觉。", "es": "Mujer: ¿A qué hora te levantas cada mañana?\nHombre: Pasadas las seis.\nMujer: Te levantas una hora antes que yo.\nHombre: También me acuesto temprano, me duermo a las 10 todas las noches.", "pinyin": "nǚ: nǐ měi tiān zǎo shang jǐ diǎn qǐ chuáng?\nnán: liù diǎn duō.\nnǚ: nǐ bǐ wǒ zǎo qǐ yí gè xiǎo shí.\nnán: wǒ shuì de yě zǎo, wǒ měi tiān wǎn shàng shí diǎn jiù shuì jiào." },
"2_5_5": { "zh": "女: 再来点儿 米饭 吧, 你 吃得太少 了。\n男: 不少 了, 今天 吃得 很好, 太 谢谢 你了。\n女: 你 做饭 做得 怎么样?\n男: 不怎么样, 我 妻子 比 我 做得 好。", "es": "Mujer: Toma un poco más de arroz, has comido muy poco.\nHombre: No es poco, hoy he comido muy bien, muchas gracias.\nMujer: ¿Qué tal cocinas?\nHombre: No muy bien, mi esposa cocina mejor que yo.", "pinyin": "nǚ: zài lái diǎn er mǐ fàn ba, nǐ chī de tài shǎo le.\nnán: bù shǎo le, jīn tiān chī de hěn hǎo, tài xiè xiè nǐ le.\nnǚ: nǐ zuò fàn zuò de zěn me yàng?\nnán: bù zěn me yàng, wǒ qī zi bǐ wǒ zuò de hǎo." },
"2_5_6": { "zh": "男: 说话 的 那个人 就是 我的 汉语 老师. 你 可能 不认识 他。\n女: 是 新来 的 汉语 老师 吗?\n男: 是 去年 来 的, 他 姓 王, 28岁。\n女: 他 比 我们 老师 小  岁。", "es": "Hombre: La persona que habla es mi profesor de chino. Puede que no le conozcas.\nMujer: ¿Es el nuevo profesor de chino?\nHombre: Llegó el año pasado, se apellida Wang y tiene 28 años.\nMujer: Es dos años menor que nuestro profesor.", "pinyin": "nán: shuō huà de nà ge rén jiù shì wǒ de hàn yǔ lǎo shī. nǐ kě néng bù rèn shi tā.\nnǚ: shì xīn lái de hàn yǔ lǎo shī ma?\nnán: shì qù nián lái de, tā xìng wáng, èr shí bā suì.\nnǚ: tā bǐ wǒ men lǎo shī xiǎo liǎng suì." },
"2_5_7": { "zh": "男: 你 怎么 买了 这么 多 东西 啊?\n女: 哥哥 今天 中午 回来 吃饭。\n男: 我 看看 买  什么 了. 羊肉, 鸡蛋, 面条, 西瓜... 真 不少! 妈妈 呢?\n女: 正在 准备 午饭 呢。", "es": "Hombre: ¿Por qué has comprado tantas cosas?\nMujer: Mi hermano mayor viene a comer hoy al medieldía.\nHombre: A ver qué has comprado... Cordero, huevos, fideos, sandía... ¡cuántas cosas! ¿Y mamá?\nMujer: Está preparando el almuerzo ahora mismo.", "pinyin": "nán: nǐ zěn me mǎi le zhè me duō dōng xi a?\nnǚ: gē ge jīn tiān zhōng wǔ huí lái chī fàn.\nnán: wǒ kàn kan mǎi shén me le. yáng ròu, jī dàn, miàn tiáo, xī guā... zhēn bù shǎo! mā ma ne?\nnǚ: zhèng zài zhǔn bèi wǔ fàn ne." },
"2_6_1": { "zh": "男: 你 看过  那个 电影 没有?\n女: 没看过. 听说 很 有意思。\n男: 那 我们 下个 星期 一起 去 看 吧。\n女: 可以, 但是 我 女朋友 也 想 去。", "es": "Hombre: ¿Has visto esa película?\nMujer: No la he visto. He oído que es muy interesante.\nHombre: Pues vayamos a verla juntos la semana que viene.\nMujer: Vale, pero mi novia también quiere ir.", "pinyin": "nán: nǐ kàn guò nà ge diàn yǐng méi yǒu?\nnǚ: méi kàn guò. tīng shuō hěn yǒu yì si.\nnán: nà wǒ men xià ge xīng qī yī qǐ qù kàn ba.\nnǚ: kě yǐ, dàn shì wǒ nǚ péng you yě xiǎng qù." },
"2_6_2": { "zh": "女: 听说 你 去过 中国. 还 想 去 吗?\n男: 我 虽然 去过 好几次, 但是 还 想 再去 玩儿玩儿。\n女: 那 我们 一起 去 吧。\n男: 好 啊, 到时候 我 给 你 打电话。", "es": "Mujer: He oído que has estado en China. ¿Quieres volver?\nHombre: Aunque he ido varias veces, quiero volver para pasear y divertirme.\nMujer: Pues vayamos juntos.\nHombre: ¡Vale! Ya te llamaré cuando sea el momento.", "pinyin": "nǚ: tīng shuō nǐ qù guò zhōng guó. hái xiǎng qù ma?\nnán: wǒ suī rán qù guò hǎo jǐ cì, dàn shì hái xiǎng zài qù wán er wán er.\nnǚ: nà wǒ men yī qǐ qù ba.\nnán: hǎo a, dào shí hou wǒ gěi nǐ dǎ diàn huà." },
"2_6_3": { "zh": "男: 明天 天气  怎么样?\n女: Aunque 是 晴天, 但是 很 冷。\n男: 那 还 能 去 跑步 吗?\n女: 可以。", "es": "Hombre: ¿Qué tiempo hará mañana?\nMujer: Aunque estará soleado, hará mucho frío.\nHombre: ¿Aun así se puede ir a correr?\nMujer: Sí.", "pinyin": "nán: míng tiān tiān qì zěn me yàng?\nnǚ: suī rán shì qíng tiān, dàn shì hěn lěng.\nnán: nà hái néng qù pǎo bù ma?\nnǚ: kě yǐ." },
"2_6_4": { "zh": "女: 这个 椅子  怎么样?\n男: 颜色 很好 但是 它 太高了。\n女: 没关系, 前面 还有 几个。\n男: 走, 我们 过去 看看。", "es": "Mujer: ¿Qué tal esta silla?\nHombre: El color es bueno, pero es demasiado alta.\nMujer: No importa, hay algunas más allí delante.\nHombre: Vamos a echar un vistazo.", "pinyin": "nǚ: zhè ge yǐ zi zěn me yàng?\nnán: yán sè hěn hǎo dàn shì tā tài gāo le.\nnǚ: méi guān xi, qián miàn hái yǒu jǐ ge.\nnán: zǒu, wǒ men guò qù kàn kan." },
"2_6_5": { "zh": "女: 你 家 离  学校 远 吗?\n男: 不太远。\n女: 你 每天 怎么 去 上学?\n男: 有时候 坐 公共汽车, 有時候 走路 去。", "es": "Hombre: ¿Está tu casa lejos de la escuela?\nHombre: No muy lejos.\nMujer: ¿Cómo vas a clase cada día?\nHombre: A veces en autobús, otras veces caminando.", "pinyin": "nǚ: nǐ jiā lí xué xiào yuǎn ma?\nnán: bú tài yuǎn.\nnǚ: nǐ měi tiān zěn me qù shàng xué?\nnán: yǒu shí hou zuò gōng gòng qì chē, yǒu shí hou zǒu lù qù." },
"2_6_6": { "zh": "男: 您 从 几岁  开始 学习 跳舞?\n女: 七岁。\n男: 是吗? 我 女儿  also 七岁了. 我 希望 她 能 和 您 学 跳舞, 可以 吗?\n女: 没问题, 非常 欢迎。", "es": "Hombre: ¿A qué edad empezó a aprender a bailar?\nMujer: A los siete años.\nHombre: ¿Ah sí? Mi hija también tiene siete años. Espero que pueda aprender con usted, ¿sería posible?\nMujer: Sin problema, es muy bienvenida.", "pinyin": "nán: nín cóng jǐ suì kāi shǐ xué xí tiào wǔ?\nnǚ: qī suì.\nnán: shì ma? wǒ nǚ ér yě qī suì le. wǒ xī wàng tā néng hé nín xué tiào wǔ, kě yǐ ma?\nnǚ: méi wèn tí, fēi cháng huān yíng." },

// NIVEL 3
"3_1_1": { "zh": "女: 邻居 王叔叔 家里 有 两只 鸟, 它们的 嘴 是 红的。 叫声 也 特别 好听。\n男: 真想 看看。 你能 带我 去 看一下 吗?", "es": "Mujer: El vecino, el tío Wang, tiene dos pájaros en casa; sus picos son rojos.\nMujer: Su canto también es especialmente agradable de escuchar.\nHombre: Realmente quiero verlos. ¿Puedes llevarme a echar un vistazo?", "pinyin": "nǚ: lín jū wáng shū shu jiā lǐ yǒu liǎng zhī niǎo, tā men de zuǐ shì hóng de. jiào shēng yě tè bié hǎo tīng.\nnán: zhēn xiǎng kàn kan. nǐ néng dài wǒ qù kàn yī xià ma?" },
"3_1_2": { "zh": "男: 您好, 我们 几点 能 上 飞机?\n女: 不好意思, 还要 再等 一会儿。", "es": "Hombre: Hola, ¿a qué hora podemos subir al avión?\nMujer: Lo siento, todavía hay que esperar un poco más.", "pinyin": "nán: nín hǎo, wǒ men jǐ diǎn néng shàng fēi jī?\nnǚ: bù hǎo yì si, hái yào zài děng yī huì er." },
"3_1_3": { "zh": "女: 这个 蛋糕 看起来 很好好吃 但我 担心 吃了 会 长胖。\n男: 没关系, 你 尝一下, 少 eat 一点儿。", "es": "Mujer: Este pastel se ve muy rico, pero me preocupa que engorde si lo como.\nHombre: No importa, pruébalo un poco; come solo un poquito.", "pinyin": "nǚ: zhè ge dàn gāo kàn qǐ lái hěn hǎo chī dàn wǒ dān xīn chī le huì zhǎng pàng.\nnán: méi guān xi, nǐ cháng yī xià, shǎo chī yī diǎn er." },
"3_1_4": { "zh": "男: 医生, 我 右边 最里面 的 牙疼。\n女: 别动, 我 给你 检查 一下。", "es": "Hombre: Doctora, me duele la muela del fondo del lado derecho.\nMujer: No te muevas, te voy a examinar.", "pinyin": "nán: yī shēng, wǒ yòu bian zuì lǐ miàn de yá téng.\nnǚ: bié dòng, wǒ gěi nǐ jiǎn chá yī xià." },
"3_1_5": { "zh": "女: 慢点儿 走, 我的 脚 有点儿 不舒服。\n男: 下次 别穿 这么 高s de 这种 鞋了。", "es": "Mujer: Camina más despacio, me duelen un poco los pies.\nHombre: La próxima vez no uses zapatos tan altos.", "pinyin": "nǚ: màn diǎn er zǒu, wǒ de jiǎo yǒu diǎn er bù shū fu.\nnán: xià cì bié chuān zhè me gāo de zhè zhǒng xié le." },
"3_2_1": { "zh": "男: 阿姨, 我 多高 了?\n女: 一米七 了. 今年 个子 长了 不少  啊。", "es": "Hombre: Tía, ¿cuánto mido ya?\nMujer: Un metro septenta. Has crecido mucho de estatura este año.", "pinyin": "nán: ā yí, wǒ duō gāo le?\nnǚ: yī mǐ qī le. jīn nián gè zi zhǎng le bù shǎo a." },
"3_2_2": { "zh": "女: 我的 照相机 是是不是 出问题 了?\n男: 没事, 应该是 没电 了。", "es": "Mujer: ¿Le pasa algo a mi cámara de fotos?\nHombre: No pasa nada, debe ser que se quedó sin batería.", "pinyin": "nǚ: wǒ de zhào xiàng jī shì bú shì chū wèn tí le?\nnán: méi shì, yīng gāi shì méi diàn le." },
"3_2_3": { "zh": "女: 西瓜 和 鸡蛋 都 买了. 还需要  A什me?\n男: 买点儿 牛奶 吧. 现在 买 还送 杯子 呢。", "es": "Mujer: Ya compré la sandía y los huevos. ¿Qué más hace falta?\nHombre: Compremos algo de leche. Si la compras ahora, hasta te regalan una taza.", "pinyin": "nǚ: xī guā hé jī dàn dōu mǎi le. hái xū yào shén me?\nnán: mǎi diǎn er niú nǎi ba. xiàn zài mǎi hái sòng bēi zi ne." },
"3_2_4": { "zh": "男: 教室里 真 安静 呢\n女: 明天 就要 考试 了. 大家 都在 复习 呢。", "es": "Hombre: Qué silenciosa está la clase.\nMujer: Mañana es el examen. Todos están repasando.", "pinyin": "nán: jiào shì lǐ zhēn ān jìng ne.\nnǚ: míng tiān jiù yào kǎo shì le. dà jiā dōu zài fù xí ne." },
"3_3_1": { "zh": "男: 明天 早上 公司 有 一个 很 重要的 会议. 我 一早 就要 过去. 你 送 儿子 去 学校 吧。", "es": "Hombre: Mañana por la mañana hay una reunión muy importante en la empresa. Tengo que irme muy temprano.\nHombre: Lleva tú al hijo a la escuela.", "pinyin": "nán: míng tiān zǎo shang gōng sī yǒu yí gè hěn zhòng yào de huì yì. wǒ yī zǎo jiù yào guò qù. nǐ sòng ér zi qù xué xiào ba." },
"3_3_2": { "zh": "男: 女儿 最 喜欢的 动物 是 大熊猫. 她 觉得 大熊猫 特别 可爱. 每次 我们 带she 去 动物园, 走的 时候 她 都要 去 和 大熊猫 说 再见。", "es": "Hombre: El animal favorito de mi hija es el panda gigante. Ella piensa que los pandas son especialmente lindos.\nHombre: Cada vez que la llevamos al zoológico, al momento de irnos siempre tiene que ir a despedirse del panda.", "pinyin": "nán: nǚ ér zuì xǐ huān de dòng wù shì dà xióng māo. tā jué de dà xióng māo tè bié kě ài. měi cì wǒ men dài tā qù dòng wù yuán, zǒu de shí hou tā dōu yào qù hé dà xióng māo shuō zài jiàn." },
"3_3_3": { "zh": "星期日 是 姐姐 的 生日。她 爱 穿 裙子。我 决定 买 一条 蓝色 的 长裙 送给 她。", "es": "El domingo es el cumpleaños de mi hermana mayor. Le gusta usar faldas. Decidí comprarle una falda larga azul como regalo.", "pinyin": "xīng qī rì shì jiě jie de shēng rì. tā ài chuān qún zi. wǒ jué dìng mǎi yī tiáo lán sè de cháng qún sòng gěi tā." },
"3_3_4": { "zh": "这 本 历史书 对 我 来说 太 难 了。因为 我 只 学 了 一年 汉语，有 很多 字 我 还 不 认识，所以 书 中 的 很多 句子 我 都 不 明白 是 什么 意思。", "es": "Este libro de historia es demasiado difícil para mí. Como solo he estudiado chino durante un año, todavía hay muchos caracteres que no reconozco, por eso muchas frases del libro no entiendo qué significan.", "pinyin": "zhè běn lì shǐ shū duì wǒ lái shuō tài nán le. yīn wèi wǒ zhǐ xué le yī nián hàn yǔ, yǒu hěn duō zì wǒ hái bù rèn shi, suǒ yǐ shū zhōng de hěn duō jù zi wǒ dōu bù míng bai shì shén me yì si." },
"3_3_5": { "zh": "女: 我 昨天 穿的 那件 绿色的 衬衫 呢?\n男: 我 给你 洗了。", "es": "Mujer: ¿Dónde está la camisa verde que me puse ayer?\nHombre: Te la lavé.", "pinyin": "nǚ: wǒ zuó tiān chuān de nà jiàn lǜ sè de chèn shān ne?\nnán: wǒ gěi nǐ xǐ le." },
"3_3_6": { "zh": "男: 小姐, 我 来 帮 您 拿 行理箱 吧?\n女: 谢谢, 请 小心 一点儿. 里面 有 一些 盘子 和 碗。", "es": "Hombre: Señorita, ¿la ayudo a llevar la maleta?\nMujer: Gracias, por favor tenga cuidado. Dentro hay algunos platos y cuencos.", "pinyin": "nán: xiǎo jie, wǒ lái bāng nín ná xíng li xiāng ba?\nnǚ: xiè xiè, qǐng xiǎo xīn yī diǎn er. lǐ miàn yǒu yī xiē pán zi hé wǎn." },
"3_3_7": { "zh": "女: 你 还 记得 这个 体育馆 吗?\n男: 当然了. 过去 我和 你哥 常来 这里 打 篮球。", "es": "Mujer: ¿Aún recuerdas este gimnasio?\nHombre: Por supuesto. En el pasado, tu hermano y yo veníamos a menudo aquí a jugar al baloncesto.", "pinyin": "nǚ: nǐ hái jì de zhè ge tǐ yù guǎn ma?\nnán: dāng rán le. guò qù wǒ hé nǐ gē cháng lái zhè lǐ dǎ lán qiú." },
"3_4_1": { "zh": "女: 爸爸, 照片 上的 那个 人 是 你 吗?\n男: 是啊, 那时 我才 23岁, 还没 跟你 妈妈 结婚 呢。", "es": "Mujer: Papá, ¿la persona de la foto eres tú?\nHombre: Sí, en ese entonces solo tenía 23 años, aún no me había casado con tu madre.", "pinyin": "nǚ: bà ba, zhào piàn shàng de nà ge rén shì nǐ ma?\nnán: shì a, nà shí wǒ cái èr shí sān suì, hái méi gēn nǐ mā ma jié hūn ne." },
"3_4_2": { "zh": "男: 今晚 吃得 有点儿 多, 等会儿 去 公园 走走 吧。\n女: 我 不去 了, 六点 半的 时候 有 我 喜欢的 电视 节目。", "es": "Hombre: Comí un poco de más esta noche, vayamos a caminar al parque en un rato.\nMujer: Yo no voy, a las seis y media pasan mi programa de televisión favorito.", "pinyin": "nán: jīn wǎn chī de yǒu diǎn er duō, děng huì er qù gōng yuán zǒu zǒu ba.\nnǚ: wǒ bú qù le, liù diǎn bàn de shí hou yǒu wǒ xǐ huān de diàn shì jié mù." },
"3_4_3": { "zh": "女: 你 给他 发 邮件 了 吗?\n男: 没有, 我 觉得 那样 说 不清楚. 还是 见面 说 吧。", "es": "Mujer: ¿Le enviaste el correo electrónico?\nHombre: No, creo que de esa manera no se explica bien. Mejor hablemos en persona.", "pinyin": "nǚ: nǐ gěi tā fā yóu jiàn le ma?\nnán: méi yǒu, wǒ jué de nà yàng shuō bù qīng chu. hái shì jiàn miàn shuō ba." },
"3_4_4": { "zh": "男: 我 到 机场 了. 飞机 还有 一 小时 起飞, 你 别 迟到 了。\n女: 不会的, 我 在 出租车 上, 还有 10分钟 就能 到。", "es": "Hombre: Ya llegué al aeropuerto. El avión despega en una hora, no llegues tarde.\nMujer: No lo haré, estoy en el taxi, llegará en 10 minutos.", "pinyin": "nán: wǒ dào jī chǎng le. fēi jī hái yǒu yī xiǎo shí qǐ fēi, nǐ bié chí dào le.\nnǚ: bú huì de, wǒ zài chū zū chē shàng, hái yǒu shí fēn zhōng jiù néng dào." },
"3_4_5": { "zh": "女: 晚饭 做好了, 准备  吃饭 了。\n男: 等一会儿, 比赛 还有 三分钟 就 结束了。\n女: 快点儿 吧, 一起 吃. 菜 冷了 就 不好吃 了。\n男: 你 先吃, 我 马上 就 看完了。", "es": "Mujer: La cena está lista, prepárate para comer.\nHombre: Espera un momento, al partido solo le faltan tres minutos para terminar.\nMujer: Date prisa, comamos juntos. Si la comida se enfría, no sabrá buena.\nHombre: Come tú primero, ya casi termino de verlo.", "pinyin": "nǚ: wǎn fàn zuò hǎo le, zhǔn bèi chī fàn le.\nnán: děng yī huì er, bǐ sài hái yǒu sān fēn zhōng jiù jié shù le.\nnǚ: kuài diǎn er ba, yī qǐ chī. cài lěng le jiù bù hǎo chī le.\nnán: nǐ xiān chī, wǒ mǎ shàng jiù kàn wán le." },
"3_4_6": { "zh": "男: 节日 快乐。\n女: 谢谢. 你 准备 怎么 过节?\n男: 我 要和 同事 去  马. 要不要 一起 去?\n女: 不了, 我 要和 丈夫 去 爬山。", "es": "Hombre: Feliz festival (o día festivo).\nMujer: Gracias. ¿Cómo piensas pasar el día festivo?\nHombre: Voy a ir a montar a caballo con mis colegas. ¿Quieres venir?\nMujer: No, voy a ir a la montaña con mi esposo.", "pinyin": "nán: jié rì kuài lè.\nnǚ: xiè xiè. nǐ zhǔn bèi zěn me guò jié?\nnán: wǒ yào hé tóng shì qù qí mǎ. yào bú yào yī qǐ qù?\nnǚ: bù le, wǒ yào hé zhàng fu qù pá shān." },
"3_4_7": { "zh": "女: 喂? 我 到 你家 楼下 了, 但是 我 忘记 你 住 哪一层 了。\n男: 8层, 809. 上了 后, 左边 第一家 就是。\n女: 知道了, 电梯 来了. 马上 上来。\n男: 好, 我 给你 开门。", "es": "Mujer: ¿Hola? Estoy abajo de tu edificio, pero olvidé en qué piso vives.\nHombre: Piso 8, 809. Al subir, la primera puerta a la izquierda es.\nMujer: Entendido, ya llegó el ascensor. Subo enseguida.\nHombre: Bien, te abro la puerta.", "pinyin": "nǚ: wèi? wǒ dào nǐ jiā lóu xià le, dàn shì wǒ wàng jì nǐ zhù nǎ yī céng le.\nnán: bā céng, bā líng jiǔ. shàng le hòu, zuǒ bian dì yī jiā jiù shì.\nnǚ: zhī dào le, diàn tī lái le. mǎ shàng shàng lái.\nnán: hǎo, wǒ gěi nǐ kāi mén." },
"3_5_1": { "zh": "女: 这辆 车 你 没开 多久 吧? 怎么 就要 换 新 facilities 的 了?\n男: 有l孩子 后 觉得 车 有点儿 小。\n女: 那 你 想 换 什么样的?\n男: 还没 决定 head 呢. 最近 正在 看。", "es": "Mujer: No hace mucho que manejas este coche, ¿verdad? ¿Por qué ya quieres cambiarlo por uno nuevo?\nHombre: Después de tener al niño, siento que el coche es un poco pequeño.\nMujer: ¿Y por cuál tipo lo quieres cambiar?\nHombre: Aún no lo he decidido. He estado mirando últimamente.", "pinyin": "nǚ: zhè liàng chē nǐ méi kāi duō jiǔ ba? zěn me jiù yào huàn xīn chē le?\nnán: yǒu le hái zi hòu jué de chē yǒu diǎn er xiǎo.\nnǚ: nà nǐ xiǎng huàn shén me yàng de?\nnán: hái méi jué dìng ne. zuì jìn zhèng zài kàn." },
"3_5_2": { "zh": "男: 您好. 我 想 借 这 两本 词典。\n女: 不好意思, 词典 不能 外借. 只能 在 这儿 看。\n男: 好的, 谢谢。\n女: 不客气。", "es": "Hombre: Hola. Quisiera pedir prestados estos dos diccionarios.\nMujer: Lo siento, los diccionarios no se prestan para llevar. Solo se pueden consultar aquí.\nHombre: De acuerdo, gracias.\nMujer: De nada.", "pinyin": "nán: nín hǎo. wǒ xiǎng jiè zhè liǎng běn cí diǎn.\nnǚ: bù hǎo yì si, cí diǎn bù néng wài jiè. zhǐ néng zài zhè ér kàn.\nnán: hǎo de, xiè xiè.\nnǚ: bú kè qì." },
"3_5_3": { "zh": "女: 外面 雨 很大 吗?\n男: 不太太. 主要是 风大. 几乎 不能 打伞。\n女: 那 你 快去 洗个 热水澡 吧. 别 感冒 了。\n男: 好。", "es": "Mujer: ¿Está lloviendo mucho afuera?\nHombre: No mucho. Principalmente es que hace mucho viento. Casi no se puede usar el paraguas.\nMujer: Entonces ve rápido a darte un baño de agua caliente. No te vayas a resfriar.\nHombre: Bien.", "pinyin": "nǚ: wài miàn yǔ hěn dà ma?\nnán: bú tài dà. zhǔ yào shì fēng dà. jī hū bù néng dǎ sǎn.\nnǚ: nà nǐ kuài qù xǐ gè rè shuǐ zǎo ba. bié gǎn mào le.\nnán: hǎo." },
"3_5_4": { "zh": "男: 房子 找好了 吗? 什么时候 搬?\n女: 这个 周末。\n男: 找 搬家 公司 了 吗?\n女: 没有. 我 朋友 有车. 他 说 会 来 帮忙。", "es": "Hombre: ¿Ya encontraste casa? ¿Cuándo te mudas?\nMujer: Este fin de semana.\nHombre: ¿Contrataste una empresa de mudanzas?\nMujer: No. Mi amigo tiene coche. Dijo que vendría a ayudar.", "pinyin": "nán: fáng zi zhǎo hǎo le ma? shén me shí hou bān?\nnǚ: zhè ge zhōu mò.\nnán: zhǎo bān jiā gōng sī le ma?\nnǚ: méi yǒu. wǒ péng you yǒu chē. tā shuō huì lái bāng máng." },
"3_5_5": { "zh": "男: 我 刚才 在 商店 门口 遇到 高校长 了。\n女: 他 最近 怎么样？\n男: 没 什么 变化。现在 还 教 三年级 的 数学课 呢。\n女: 是吗？他 的 身体 一直 都 很 不错。", "es": "Hombre: Hace un momento me encontré con el director Gao en la puerta de la tienda. Mujer: ¿Cómo ha estado últimamente? Hombre: No ha cambiado nada. Todavía enseña la clase de matemáticas de tercer grado. Mujer: Ah, ¿sí? Su salud siempre ha sido bastante buena.", "pinyin": "nán: wǒ gāng cái zài shāng diàn mén kǒu yù dào gāo xiào zhǎng le.\nnǚ: tā zuì jìn zěn me yàng?\nnán: méi shén me biàn huà. xiàn zài hái jiāo sān nián jí de shù xué kè ne.\nnǚ: shì ma? tā de shēn tǐ yī zhí dōu hěn bú cuò." },
"3_6_1": { "zh": "女: Mira, ¿qué te parece este bolso?\n男: 不错, 但是 我 觉得 旁边 那个 上面 有 月亮的 更好看。", "es": "Mujer: Mira, ¿qué te parece este bolso?\nHombre: No está mal, pero creo que aquel de al lado que tiene una luna es más bonito.", "pinyin": "nǚ: nǐ kàn, zhè ge bāo zěn me yàng?\nnán: bú cuò, dàn shì wǒ jué de páng biān nà ge shàng miàn yǒu yuè liang de gèng hǎo kàn." },
"3_6_2": { "zh": "男: 这条 鱼 看起来 不太 新鲜. 你 在 哪儿 买 service 的?\n女: 就是 路口 我们 常去的 那家 超市, 我 还 买了 些 苹果。", "es": "Hombre: Este pescado no parece muy fresco. ¿Dónde lo compraste?\nMujer: Es el supermercado del cruce al que solemos ir, también compré algunas manzanas.", "pinyin": "nán: zhè tiáo yú kàn qǐ lái bú tài xīn xiān. nǐ zài nǎ ér mǎi de?\nnǚ: jiù shì lù kǒu wǒ men cháng qù de nà jiā chāo shì, wǒ hái mǎi le xiē píng guǒ." },
"3_6_3": { "zh": "女: 你 等一下. 我 写在 本子 上. 我们 过一会儿 忘了。\n男: 好, 那 我 慢点儿 说。", "es": "Mujer: Espera un momento. Lo escribiré en el cuaderno. No sea que lo olvidemos en un rato.\nHombre: Está bien, entonces hablaré más despacio.", "pinyin": "nǚ: nǐ děng yī xià. wǒ xiě zài běn zi shàng. wǒ men guò yī huì er wàng le.\nnán: hǎo, nà wǒ màn diǎn er shuō." },
"3_6_4": { "zh": "男: 你 学会 用 筷子 了?\n女: 是定的, 一个 中国 朋友 教我的. 我 练习了 好几天 才 学会。", "es": "Hombre: ¿Has aprendido a usar los palillos?\nMujer: Sí, me enseñó un amigo chino. Practiqué durante varios días antes de aprender.", "pinyin": "nán: nǐ xué huì yòng kuài zi le?\nnǚ: shì de, yí gè zhōng guó péng you jiāo wǒ de. wǒ liàn xí le hǎo jǐ tiān cái xué huì." },
"3_6_5": { "zh": "女: 还要 多久  啊? 我 都 站了 一个 小时 了. 太累了!\n男: 我 很快 就 画完了, 姐, 你 站好, 别动。", "es": "Mujer: ¿Cuánto falta todavía? Llevo una hora de pie. ¡Estoy muy cansada!\nHombre: Terminaré de dibujar pronto; hermana, quédate bien ahí, no te muevas.", "pinyin": "nǚ: hái yào duō jiǔ a? wǒ dōu zhàn le yí gè xiǎo shí le. tài lèi le!\nnán: wǒ hěn kuài jiù huà wán le, jiě, nǐ zhàn hǎo, bié dòng." },
"3_6_6": { "zh": "男: 我 打算 周末 请 同事 来 家里 做客, 所以 今天 要把 房间 好好 打扫 一下。", "es": "Hombre: Tengo planeado invitar a mis colegas a casa este fin de semana, así que hoy tengo que limpiar bien la habitación.", "pinyin": "nán: wǒ dǎ suàn zhōu mò qǐng tóng shì lái jiā lǐ zuò kè, suǒ yǐ jīn tiān yào bǎ fáng jiān hǎo hǎo dǎ sǎo yī xià." },
"3_6_7": { "zh": "男: 我 简单 介绍 一下. 公司 的 工作 时间  是 从 早上 八点 到 下午 5点. 中午 12点 到 1点半 休息。", "es": "Hombre: Haré una breve presentación. El horario de trabajo de la empresa es de 8 de la mañana a 5 de la tarde.\nHombre: El descanso es de 12 del mediodía a 1:30.", "pinyin": "nán: wǒ jiǎn dān jiè shào yī xià. gōng sī de gōng zuò shí jiān shì cóng zǎo shang bā diǎn dào xià wǔ wǔ diǎn. zhōng wǔ shí èr diǎn dào yī diǎn bàn xiū xi." },
"3_6_8": { "zh": "男: 我 爸爸 是个 历史 老师. 经常 给我 讲 历史 故事. 在 他的 影响下 我 从小 就 对 历史 感兴趣。", "es": "Hombre: Mi padre es profesor de historia. A menudo me cuenta historias históricas.\nHombre: Bajo su influencia, me intereso por la historia desde pequeño.", "pinyin": "nán: wǒ bà ba shì gè lì shǐ lǎo shī. jīng cháng gěi wǒ jiǎng lì shǐ gù shi. zài tā de yǐng xiǎng xià wǒ cóng xiǎo jiù duì lì shǐ gǎn xìng qù." },
"3_6_9": { "zh": "女: 你 妻子 怎么 没和 你 一起来?\n男:  她 系统的 爷爷 出院 了. 她 这几天 都在 医院 照顾 他 呢。", "es": "Mujer: ¿Como es que tu esposa no ha venido contigo?\nHombre: Su abuelo recibió el alta. Ella ha estado estos días en el hospital cuidándolo.", "pinyin": "nǚ: nǐ qī zi zěn me méi hé nǐ yī qǐ lái?\nnán: tā yé ye chū yuàn le. tā zhè jǐ tiān dōu zài yī yuàn zhào gù tā ne." },
"3_6_10": { "zh": "女: 我 中午 只 吃了 点儿 菜, 没吃 米饭. 现在  真饿。\n男: 冰箱里 有块儿 蛋糕. 你 去 吃了 吧。", "es": "Mujer: A mediodía solo comí algo de verdura, no comí arroz. Ahora tengo mucha hambre.\nHombre: Hay un trozo de pastel en la nevera. Ve a comértelo.", "pinyin": "nǚ: wǒ zhōng wǔ zhǐ chī le diǎn er cài, méi chī mǐ fàn. xiàn zài zhēn è.\nnán: bīng xiāng lǐ yǒu kuài er dàn gāo. nǐ qù chī le ba." },
"3_7_1": { "zh": "男: 你 不去 留学 了?\n女: 对, 我 已经 在 南方 一个 城市 找好 工作 了。", "es": "Hombre: ¿Ya no te vas a estudiar al extranjero?\nMujer: No, ya he encontrado un trabajo en una ciudad del sur.", "pinyin": "nán: nǐ bú qù liú xué le?\nnǚ: duì, wǒ yǐ jīng zài nán fāng yí gè chéng shì zhǎo hǎo gōng zuò le." },
"3_7_2": { "zh": "男: 你的 自行车 在 楼下 吗? 借我 骑 一下。\n女: 你 什么时候 回来? 我 下午 也要 用。\n男: 我 去 图书馆 还 两本 书 就 回来。\n女: 那 没关系. 你 去 骑 吧。", "es": "Hombre: ¿Tu bicicleta está abajo? Préstamela un momento.\nMujer: ¿Cuándo volverás? Yo también la necesito por la tarde.\nHombre: Voy a la biblioteca a devolver dos libros y vuelvo.\nMujer: Entonces no importa. Ve a usarla.", "pinyin": "nán: nǐ de zì xíng chē zài lóu xià ma? jiè wǒ qí yī xià.\nnǚ: nǐ shén me shí hou huí lái? wǒ xià wǔ yě yào yòng.\nnán: wǒ qù tú shū guǎn hái liǎng běn shū jiù huí lái.\nnǚ: nà méi guān xi. nǐ qù qí ba." },
"3_7_3": { "zh": "女: 王老师, 校长 让你 去 他 办公室 一下。\n男: 他 说  A什me 事 了 吗?\n女: 没有, 但 可能 跟 这次 的 体育 成绩 有关系。", "es": "Mujer: Profesor Wang, el director le pide que vaya un momento a su oficina.\nHombre: ¿Dijo de qué se trata?\nMujer: No, pero posiblemente tenga relación con las notas de educación física de esta vez.", "pinyin": "nǚ: wáng lǎo shī, xiào zhǎng ràng nǐ qù tā bàn gōng shì yī xià.\nnán: tā shuō shén me shì le ma?\nnǚ: méi yǒu, dàn kě néng gēn zhè cì de tǐ yù chéng jì yǒu guān xi." },
"3_7_4": { "zh": "男: 这些 照片 都是 你 照 de?\n女: 对. 我 照得 怎么样?\n男: 照相 水平 比 以前 提高 了 不少。\n女: 真的? 我 现在 几乎 天天 带着 相机 出门。", "es": "Hombre: ¿Todas estas fotos las has hecho tú?\nMujer: Sí. ¿Qué tal me han salido?\nHombre: Tu nivel de fotografía ha mejorado mucho respecto a antes.\nMujer: ¿De verdad? Ahora salgo de casa con la cámara casi todos los días.", "pinyin": "nán: zhè xiē zhào piàn dōu shì nǐ zhào de?\nnǚ: duì. wǒ zhào de zěn me yàng?\nnán: zhào xiàng shuǐ píng bǐ yǐ qián tí gāo le bù shǎo.\nnǚ: zhēn de? wǒ xiàn zài jī hū tiān tiān dài zhe xiàng jī chū mén." },
"3_7_5": { "zh": "女: 你 去过 这里 的 动物园 吗?\n男: 听说 很有名, 但 一直 没机会 去。\n女: 我 这儿 有  张 大熊猫 文化节 的 票. 一起 去 吧?\n男: 好啊. 不知道 节日 那天 人 多不多。", "es": "Mujer: ¿Has estado en el zoológico de aquí?\nHombre: He oído que es muy famoso, pero no he tenido oportunidad de ir.\nMujer: Tengo aquí dos entradas para el Festival Cultural del Panda Gigante. ¿Vamos juntos?\nHombre: ¡Vale! No sé si habrá mucha gente el día del festival.", "pinyin": "nǚ: nǐ qù guò zhè lǐ de dòng wù yuán ma?\nnán: tīng shuō hěn yǒu míng, dàn yī zhí méi jī huì qù.\nnǚ: wǒ zhè ér yǒu liǎng zhāng dà xióng māo wén huà jié de piào. yī qǐ qù ba?\nnán: hǎo a. bù zhī dào jié rì nà tiān rén duō bù duō." },
"3_7_6": { "zh": "女: 足球赛 这么快 就 结束了?\n男: 没有. 我 头疼, 所以 就 先 回来 了。\n女: 是prefix_not_enot 感ismo 了?\n男: 是, 还有点儿 发烧. 家里 有药 吗?", "es": "Mujer: ¿Tan pronto ha terminado el partido de fútbol?\nHombre: No. Me dolía la cabeza, así que me he vuelto antes.\nMujer: ¿No será que te has resfriado?\nHombre: Sí, y tengo un poco de fiebre. ¿Hay medicina en casa?", "pinyin": "nǚ: zú qiú sài zhè me kuài jiù jié shù le?\nnán: méi yǒu. wǒ tóu téng, suǒ yǐ jiù xiān huí lái le.\nnǚ: shì bú shì gǎn mào le?\nnán: shì, hái yǒu diǎn er fā shāo. jiā lǐ yǒu yào ma?" },
"3_7_7": { "zh": "女: 来 北京 快 一个月 了. 还 习惯 吗?\n男: 还好, 就是 太冷 了。\n女: 北京 的 冬天 是 很冷. 你们 国家 天气 怎么样?\n男: 我们 那儿 一年四季 都 很热。", "es": "Mujer: Hace ya casi un mes que llegaste a Beijing. ¿Te has acostumbrado?\nHombre: Bastante bien, solo que hace demasiado frío.\nMujer: El invierno en Beijing es muy frío. ¿Qué tal es el tiempo en tu país?\nHombre: Allí hace calor durante las cuatro estaciones del año.", "pinyin": "nǚ: lái běi jīng kuài yī gè yuè le. hái xí guàn ma?\nnán: hái hǎo, jiù shì tài lěng le.\nnǚ: běi jīng de dōng tiān shì hěn lěng. nǐ men guó jiā tiān qì zěn me yàng?\nnán: wǒ men nà ér yī nián sì jì dōu hěn rè." },
"3_7_8": { "zh": "男: 李小姐, 这个 房子 您 还 满意 吧?\n女: 除了 没 电梯 不太 方便 外, 其他 的 都 不错。\n男: 三层 也不高. 两分钟 就 上来 了。", "es": "Hombre: Señorita Li, ¿está satisfecha con este piso?\nMujer: Aparte de que no hay ascensor y es poco conveniente, lo demás está todo bien.\nHombre: El tercer piso no es alto. Se sube en dos minutos.", "pinyin": "nán: lǐ xiǎo jie, zhè ge fáng zi nín hái mǎn yì ba?\nnǚ: chú le méi diàn tī bú tài fāng biàn wài, qí tā de dōu bú cuò.\nnán: sān céng yě bù gāo. liǎng fēn zhōng jiù shàng lái le." },
"3_7_9": { "zh": "女: 先生, 这是 菜单, 请问, 你 需要 点儿  A什me?\n男: 一碗 鸡蛋面, 一瓶 啤酒。\n女: 好的. 您 在 这儿 吃  还是 带走?\n男: 带走。", "es": "Mujer: Señor, aquí tiene el menú. Perdone, ¿qué desea pedir?\nHombre: Un bol de fideos con huevo y una botella de cerveza.\nMujer: Muy bien. ¿Para comer aquí o para llevar?\nHombre: Para llevar.", "pinyin": "nǚ: xiān sheng, zhè shì cài dān, qǐng wèn, nǐ xū yào diǎn er shén me?\nnán: yī wǎn jī dàn miàn, yī píng pí jiǔ.\nnǚ: hǎo de. nín zài zhè ér chī hái shì dài zǒu?\nnán: dài zǒu." },
"3_8_1": { "zh": "男: 开始 刮风 了, 天 也 越来越 黑. 可能 很快 就会 下雨, 我们 还是 早点儿 回que 吧。", "es": "Hombre: Ha empezado a soplar el viento y el cielo está cada vez más oscuro.\nHombre: Es posible que llueva pronto, será mejor que regresemos temprano.", "pinyin": "nán: kāi shǐ guā fēng le, tiān yě yuè lái yuè hēi. kě néng hěn kuài jiù huì xià yǔ, wǒ men hái shì zǎo diǎn er huí qù ba." },
"3_8_2": { "zh": "男: 我 把 书 放在 教室 的 桌子 上了. 如果 你 要用 的 话, 可以 自己 去 拿。", "es": "Hombre: He dejado el libro sobre la mesa de la clase. Si necesitas usarlo, puedes ir tú mismo a cogerlo.", "pinyin": "nán: wǒ bǎ shū fàng zài jiào shì de zhuō zi shàng le. rú guǒ nǐ yào yòng de huà, kě yǐ zì jǐ qù ná." },
"3_8_3": { "zh": "男: 现在 已经 9点 了, 会议 什么时候 开始?\n女: 再过 半个 小时 吧. 会议室 的 灯 坏了。", "es": "Hombre: Ya son las 9, ¿cuándo empieza la reunión?\nMujer: En una media hora. La luz de la sala de reuniones se ha estropeado.", "pinyin": "nán: xiàn zài yǐ jīng jiǔ diǎn le, huì yì shén me shí hou kāi shǐ?\nnǚ: zài guò bàn gè xiǎo shí ba. huì yì shì de dēng huài le." },
"3_8_4": { "zh": "男: 我的 电脑 总是 有 奇怪 的 声音. 你 知道 是 怎么 回事 吗?\n女: 我 不太 清楚, 你 可以 拿过来 给我 看看。", "es": "Hombre: Mi ordenador force siempre hace ruidos extraños. ¿Sabes a qué se debe?\nMujer: No lo tengo muy claro, puedes traérmelo para que le eche un vistazo.", "pinyin": "nán: wǒ de diàn nǎo zǒng shì yǒu qí guài de shēng yīn. nǐ zhī dào shì zěn me huí shì ma?\nnǚ: wǒ bú tài qīng chu, nǐ kě yǐ ná guò lái gěi wǒ kàn kan." },
"3_8_5": { "zh": "男: 我们 决定 结婚 了, 就在 今年 秋天. 你 能来 吗?\n女: 太好了, 真为 你们 高兴. 我 一定 会 参加 的。", "es": "Hombre: Hemos decidido casarnos, será este otoño. ¿Puedes venir?\nMujer: ¡Qué bien! Me alegro mucho por vosotros. Sin duda asistiré.", "pinyin": "nán: wǒ men jué dìng jié hūn le, jiù zài jīn nián qiū tiān. nǐ néng lái ma?\nnǚ: tài hǎo le, zhēn wèi nǐ men gāo xìng. wǒ yī dìng huì cān jiā de." },
"3_8_6": { "zh": "男: 你 穿 这条 裙子. 真 好看。\n女: 如果 我 再 瘦 一点儿 就 更好 了。\n男: 其实 你 不胖 啊!\n女: 女人 总是 希望 自己 能 更瘦 一些。", "es": "Hombre: Te queda muy bien ese vestido. Estás muy guapa.\nMujer: Si estuviera un poco más delgada sería mejor.\nHombre: ¡En realidad no estás gorda!\nMujer: Las mujeres siempre desean estar más delgadas.", "pinyin": "nán: nǐ chuān zhè tiáo qún zi. zhēn hǎo kàn.\nnǚ: rú guǒ wǒ zài shòu yī diǎn er jiù gèng hǎo le.\nnán: qí shí nǐ bú pàng a!\nnǚ: nǚ rén zǒng shì xī wàng zì jǐ néng gèng shòu yī xiē." },
"3_8_7": { "zh": "男: 我的 信用卡 不见了。\n女: 你 先 别急着 找, 好好 想想 放在 哪儿 了。\n男: 我 我 刚才 去了 银行。\n女: 可能是 忘在 那儿 了 吧。", "es": "Hombre: Mi tarjeta de crédito ha desaparecido.\nMujer: No te desesperes buscándola todavía, piensa bien dónde la pusiste.\nHombre: Hace un momento estuve en el banco.\nMujer: Probablemente se te olvidó allí.", "pinyin": "nán: wǒ de xìn yòng kǎ bú jiàn le.\nnǚ: nǐ xiān bié jí zhe zhǎo, hǎo hǎo xiǎng xiǎng fàng zài nǎ ér le.\nnán: wǒ gāng cái qù le yín háng.\nnǚ: kě néng shì wàng zài nà ér le ba." },
"3_8_8": { "zh": "女: 我 必须 在 3:00 前 到 火车站. 不会 晚 吧。\n男: 放心 吧, 车站 就在 附近, 你 要去 南门 还是 北门?\n女: 不太 清楚, 我 买 de 是 快车票。\n男: 快车 一般 都从 北门 上车。", "es": "Mujer: Debo llegar a la estación antes de las 3:00. No llegaré tarde, ¿verdad?\nHombre: No te preocupes, la estación está cerca. ¿Vas a la puerta sur o a la norte?\nMujer: No estoy muy segura, compré un billete de tren rápido.\nHombre: Los trenes rápidos suelen salir de la puerta norte.", "pinyin": "nǚ: wǒ bì xū zài sān diǎn qián dào huǒ chē zhàn. bú huì wǎn ba.\nnán: fàng xīn ba, chē zhàn jiù zài fù jìn, nǐ yào qù nán mén hái shì běi mén?\nnǚ: bú tài qīng chu, wǒ mǎi de shì kuài chē piào.\nnán: kuài chē yī bān dōu cóng běi mén shàng chē." },
"3_8_9": { "zh": "男: 狗 真 可爱。\n女: 它们 还 非常 聪明 呢。\n男: 真 希望 有 一天 我能 有 一一只 系统的 狗。\n女: 一定 会 的。", "es": "Hombre: Los perros son realmente adorables.\nMujer: Además son muy inteligentes.\nHombre: De verdad espero tener algún día mi propio perro.\nMujer: Seguro que sí.", "pinyin": "nán: gǒu zhēn kě ài.\nnǚ: tā men hái fēi cháng cōng míng ne.\nnán: zhēn xī wàng yǒu yī tiān wǒ néng yǒu yī zhī zì jǐ de gǒu.\nnǚ: yī dìng huì de." },
"3_8_10": { "zh": "男: 妈妈, 你 怎么 这么 晚 还 出去 啊?\n女: 你 爸爸 喝了 点儿 酒, 开不了 车. 我 去 接  他。\n男: 天黑 了, 出门 要 小心。\n女: 好, 一 接to 你爸, 我 就 回来。", "es": "Hombre: Mamá, ¿como es que sales tan tarde?\nMujer: Tu padre ha bebido un poco de alcohol y no puede conducir. Voy a recogerlo.\nHombre: Ha oscurecido, ten cuidado al salir.\nMujer: De acuerdo, en cuanto recoja a tu padre, volveré.", "pinyin": "nán: mā ma, nǐ zěn me zhè me wǎn hái chū qù a?\nnǚ: nǐ bà ba hē le diǎn er jiǔ, kāi bù liǎo chē. wǒ qù jiē tā.\nnán: tiān hēi le, chū mén yào xiǎo xīn.\nnǚ: hǎo, yī jiē dào nǐ bà, wǒ jiù huí lái." },
"3_9_1": { "zh": "男: 看一下 手表, 现在 几点 了?\n女: 三点 零二. 说 三点半 到, 还差  半个 小时 呢, 再 等等 吧。\n男: 叔叔 和  阿yi 是 第一次 来 北京, 会不会 走错路 了?\n女: 我 再 打个 电话 问问。", "es": "Hombre: Mira el reloj, ¿qué hora es?\nMujer: Las tres y dos. Dijeron que llegarían a las tres y media, falta media hora todavía, esperemos un poco más.\nHombre: Es la primera vez que mis tíos vienen a Beijing, ¿se habrán equivocado de camino?\nMujer: Voy a llamar de nuevo para preguntar.", "pinyin": "nán: kàn yī xià shǒu biǎo, xiàn zài jǐ diǎn le?\nnǚ: sān diǎn líng èr. shuō sān diǎn bàn dào, hái chà bàn gè xiǎo shí ne, zài děng deng ba.\nnán: shū shu hé ā yí shì dì yī cì lái běi jīng, huì bú huì zǒu cuò lù le?\nnǚ: wǒ zài dǎ gè diàn huà wèn wen." },
"3_9_2": { "zh": "女: 你 终于 来了, 都 八点 一刻 了。\n男: 对不起, 来 机场 的 路上 才 发现 没带 护照。", "es": "Mujer: Por fin llegas, ya son las ocho y cuarto.\nHombre: Lo siento, de camino al aeropuerto me di cuenta de que no traía el pasaporte.", "pinyin": "nǚ: nǐ zhōng yú lái le, dōu bā diǎn yī kè le.\nnán: duì bù qǐ, lái jī chǎng de lù shàng cái fā xiàn méi dài hù zhào." },
"3_9_3": { "zh": "女: 小心 点儿, 你 一个人 可以 吗?\n男: 你 放心 吧. 系统的 厨房 又 不是 第一次 出问题。", "es": "Mujer: Ten cuidado, ¿puedes tú solo?\nHombre: No te preocupes. No es la primera vez que nuestra cocina da problemas.", "pinyin": "nǚ: xiǎo xīn diǎn er, nǐ yí gè rén kě yǐ ma?\nnán: nǐ fàng xīn ba. wǒ jiā de chú fáng yòu bú shì dì yī cì chū wèn tí." },
"3_9_4": { "zh": "男: 这样 可以 吗?\n女: 左边 低了, 再 高 一点儿。", "es": "Hombre: ¿Así está bien?\nMujer: El lado izquierdo está bajo, súbelo un poco más.", "pinyin": "nán: zhè yàng kě yǐ ma?\nnǚ: zuǒ bian dī le, zài gāo yī diǎn er." },
"3_9_5": { "zh": "女: 现在 天 “短” 了。\n男: 天 “短” 了 是 什么 意思? 我 没听懂。\n女: 就是 说 白天 的 时间 短了, 天黑 的 时间 早了, 明白了?\n男: 我 明白了, 就是 晚上 的 时间 长了, 白天 的 时间 短了。", "es": "Mujer: Ahora el día se ha \"acortado\".\nHombre: ¿Qué significa que el día se ha \"acortado\"? No lo entiendo.\nMujer: Quiere decir que el tiempo de luz diurna es más breve y oscurece antes, ¿entiendes?\nHombre: Entiendo, es que el tiempo de noche es más largo y el de día más corto.", "pinyin": "nǚ: xiàn zài tiān \"duǎn\" le.\nnán: tiān \"duǎn\" le shì shén me yì si? wǒ méi tīng dǒng.\nnǚ: jiù shì shuō bái tiān de shí jiān duǎn le, tiān hēi de shí jiān zǎo le, míng bai le?\nnán: wǒ míng bai le, jiù shì wǎn shàng de shí jiān cháng le, bái tiān de shí jiān duǎn le." },
"3_9_6": { "zh": "男: 经常 吃 甜的 东西 容易 变胖。\n女: 我 同意, 所以 我 不吃 糖。\n男: 那 你 怎么 还敢 吃 那么 多 蛋糕?\n女: 没关系, 这种 蛋糕 不甜, 没放 糖。", "es": "Hombre: Comer cosas dulces a menudo hace que uno engorde fácilmente.\nMujer: Estoy de acuerdo, por eso no como azúcar.\nHombre: ¿Entonces cómo es que te atreves de comer tanto pastel?\nMujer: No pasa nada, este tipo de pastel no es dulce, no lleva azúcar.", "pinyin": "nán: jīng cháng chī tián de dōng xi róng yì biàn pàng.\nnǚ: wǒ tóng yì, suǒ yǐ wǒ bù chī táng.\nnán: nà nǐ zěn me hái gǎn chī nà me duō dàn gāo?\nnǚ: méi guān xi, zhè zhǒng dàn gāo bù tián, méi fàng táng." },
"3_9_7": { "zh": "男: 明天 是 妹妹 的 生日, 我 给他 买了 本 汉语 字典。\n女: 你 怎么 知道 她 在 学 汉语? 我 还以为 你 不关心 系统的 学习 呢。", "es": "Hombre: Mañana es el cumpleaños de mi hermana menor, le he comprado un diccionario de chino.\nMujer: ¿Cómo sabes que está studying chino? Pensaba que no te interesabas por sus estudios.", "pinyin": "nán: míng tiān shì mèi mei de shēng rì, wǒ gěi tā mǎi le běn hàn yǔ zì diǎn.\nnǚ: nǐ zěn me zhī dào tā zài xué hàn yǔ? wǒ hái yǐ wéi nǐ bù guān xīn tā de xué xí ne." },
"3_9_8": { "zh": "女: 给我 来 一杯  果zhi儿 吧, 谢谢。\n男: 不客气, 冰箱里 没有 葡萄 汁儿 了, 就 喝 这个 吧。", "es": "Mujer: Ponme un vaso de zumo, gracias.\nHombre: De nada, no queda zumo de uva en la nevera, bebe este.", "pinyin": "nǚ: gěi wǒ lái yī bēi guǒ zhī er ba, xiè xiè.\nnán: bú kè qì, bīng xiāng lǐ méi yǒu pú táo zhī er le, jiù hē zhè ge ba." },
"3_9_9": { "zh": "男: 眼镜、帽子、地图、啤酒, 一个 也  能少。。\n女: 好了, 准备得 很 认真, 我 相信  已经 准备 好了。", "es": "Hombre: Gafas, gorra, mapa, cerveza... no puede faltar ni una cosa.\nMujer: Muy bien, te has preparado con mucha dedicación, confío en que ya estés listo.", "pinyin": "nán: yǎn jìng, mào zi, dì tú, pí jiǔ, yí gè yě bù néng shǎo.\nnǚ: hǎo le, zhǔn bèi de hěn rèn zhēn, wǒ xiāng xìn nǐ yǐ jīng zhǔn bèi hǎo le." },

// NIVEL 4
"4_1_1": { "zh": "女: 把 香蕉皮 扔到 垃圾桶 里 去, 以后 别 随便 扔 东西。\n男: 知道了, 奶奶。\n女: 数学 作业 写完了 吗?\n男: 没 呢, 我 先 出去 玩儿 一会儿, 您 在家 休息 吧。", "es": "Mujer: Tira la piel de plátano a la papelera, no tires cosas a la ligera en el futuro.\nHombre: Lo sé, abuela.\nMujer: ¿Has terminado los deberes de matemáticas?\nHombre: Todavía no, saldré a jugar un rato primero, descanse usted en casa.", "pinyin": "nǚ: bǎ xiāng jiāo pí rēng dào lā jī tǒng lǐ qù, yǐ hòu bié suí biàn rēng dōng xi.\nnán: zhī dào le, nǎi nai.\nnǚ: shù xué zuò yè xiě wán le ma?\nnán: méi ne, wǒ xiān chū qù wán er yī huì er, nín zài jiā xiū xi ba." },
"4_1_2": { "zh": "男: 我 约了 几个 同学 星期六 上午 去 打 网球, 你 也 去?\n女: 可是 我 不会 打 网球。\n男: 那 你 会 打 羽毛球 吗?\n女: 会。\n男: 网球 跟 羽毛球 差不多, 很好 学, 到时候 我 教 你。", "es": "Hombre: He quedado con unos compañeros de clase para jugar al tenis el sábado por la mañana, ¿tú también vas?\nMujer: Pero yo no sé jugar al tenis.\nHombre: Entonces, ¿sabes jugar al bádminton?\nMujer: Sí.\nHombre: El tenis es parecido al bádminton, es muy fácil de aprender, ya te enseñaré cuando llegue el momento.", "pinyin": "nán: wǒ yuē le jǐ ge tóng xué xīng qī liù shàng wǔ qù dǎ wǎng qiú, nǐ yě qù?\nnǚ: kě shì wǒ bú huì dǎ wǎng qiú.\nnán: nà nǐ huì dǎ yǔ máo qiú ma?\nnǚ: huì.\nnán: wǎng qiú gēn yǔ máo qiú chà bù duō, hěn hǎo xué, dào shí hou wǒ jiāo nǐ." },
"4_1_3": { "zh": "女: 师傅, 请问 还有 饼干 吗?\n男: 卖完了, 蛋糕 还要 吗?\n女: 刚 出炉 的 蛋糕 挺 香的, 给我 来 两个 吧, 多少 钱?\n男: 每一个 六块钱, 一共 十二块。", "es": "Mujer: Señor, disculpe, ¿quedan galletas?\nHombre: Se han agotado, ¿quiere pastel?\nMujer: El pastel recién horneado huele muy bien, déme dos, ¿cuánto cuesta?\nHombre: Seis yuanes cada uno, doce en total.", "pinyin": "nǚ: shī fu, qǐng wèn hái yǒu bǐng gān ma?\nnán: mài wán le, dàn gāo hái yào ma?\nnǚ: gāng chū lú de dàn gāo tǐng xiāng de, gěi wǒ lái liǎng ge ba, duō shao qián?\nnán: měi yī gè liù kuài qián, yī gòng shí èr kuài." },
"4_1_4": { "zh": "男: 听说 你 准备 买 房子? 看了 几家 了?\n女: 看了 两个 地方, 感觉 都不错, 离 公司 挺 近的, 坐 地铁 二十分钟 就 到了。\n男: 那 房租 贵不贵 呢?\n女: 挺 贵的, 我 还在 考虑。", "es": "Hombre: ¿He oído que planeas comprar una casa? ¿Cuántas has visto ya?\nMujer: He visto dos lugares y ambos me parecen bien, están bastante cerca de la empresa, se llega en veinte minutos en metro.\nHombre: Entonces, ¿el alquiler es caro?\nMujer: Bastante caro, todavía lo estoy pensando.", "pinyin": "nán: tīng shuō nǐ zhǔn bèi mǎi fáng zi? kàn le jǐ jiā le?\nnǚ: kàn le liǎng ge dì fang, gǎn jué dōu bú cuò, lí gōng sī tǐng jìn de, zuò dì tiě èr shí fēn zhōng jiù dào le.\nnán: nà fáng zū guì bú guì ne?\nnǚ: tǐng guì de, wǒ hái zài kǎo lǜ." },
"4_1_5": { "zh": "女: 天气 预报 说 明天 有 大雪, 你 外出 的 时候 多 穿 点儿 衣服。\n男: 好的, 我 知道了, 谢谢 你的 提醒。\n女: 还有, 别 忘了 带 把 伞。\n男: 好的。", "es": "Mujer: El pronóstico del tiempo dice que mañana habrá fuertes nevadas, ponte más ropa cuando salgas.\nHombre: De acuerdo, lo sé, gracias por tu recordatorio.\nMujer: Además, no olvides llevar un paraguas.\nHombre: De acuerdo.", "pinyin": "nǚ: tiān qì yù bào shuō míng tiān yǒu dà xuě, nǐ wài chū de shí hou duō chuān diǎn er yī fu.\nnán: hǎo de, wǒ zhī dào le, xiè xiè nǐ de tí xǐng.\nnǚ: hái yǒu, bié wàng le dài bǎ sǎn.\nnán: hǎo de." },
"4_2_1": { "zh": "女: 这张 纸 上 写的 都是 什么 呀?\n男: 我们 班 同学 的 电话 号码 和 名字。\n女: 给我 看看...... 哎, 怎么 没有 小王 的?\n男: 啊? 我 看看, 真的 吗? 噢, 我 漏掉 了, 我 现在 就 加上。", "es": "Mujer: ¿Qué es todo esto que está escrito en este papel?\nHombre: Los números de teléfono y nombres de mis compañeros de clase.\nMujer: Déjame ver... ¡Anda! ¿Por qué no está el de Xiao Wang?\nHombre: ¿Ah? Déjame ver, ¿de verdad? Oh, se me pasó por alto, lo añadiré ahora mismo.", "pinyin": "nǚ: zhè zhāng zhǐ shàng xiě de dōu shì shén me ya?\nnán: wǒ men bān tóng xué de diàn huà hào mǎ hé míng zi.\nnǚ: gěi wǒ kàn kan...... āi, zěn me méi yǒu xiǎo wáng de?\nnán: a? wǒ kàn kan, zhēn de ma? ō, wǒ lòu diào le, wǒ xiàn zài jiù jiā shàng." },
"4_2_2": { "zh": "男: 你 再 仔细 看看, 是不是 哪儿 错了?\n女: 没有 啊, 一共 五台 电脑、 三张 办公桌, 还有......\n男: 不对, 你 把 电脑 和 桌子 的 数量 写反了。\n女: 对不起, 我 写错了, 我 再 重新 填 一张 单子 吧。", "es": "Hombre: Vuelve a mirar con atención, ¿no hay algún error?\nMujer: No, en total son cinco ordenadores, tres mesas de oficina, y además...\nHombre: No es correcto, has escrito al revés la cantidad de ordenadores y de mesas.\nMujer: Lo siento, me he equivocado al escribir, volveré a rellenar otro formulario.", "pinyin": "nán: nǐ zài zǐ xì kàn kan, shì bú shì nǎ ér cuò le?\nnǚ: méi yǒu a, yī gòng wǔ tái diàn nǎo, sān zhāng bàn gōng zhuō, hái yǒu......\nnán: bú duì, nǐ bǎ diàn nǎo hé zhuō zi de shù liàng xiě fǎn le.\nnǚ: duì bù qǐ, wǒ xiě cuò le, wǒ zài chóng xīn tián yī zhāng dān zi ba." },
"4_2_3": { "zh": "女: 小李, 帮 我 把 这份 材料 复印 五份, 一会儿 开会 要 用。\n男: 好的, 经理, 我 现在 就 去办。\n女: 还有, 复印 好了 以后 拿到 二楼 的 会议室 给我。\n男: 没问题, 经理。", "es": "Mujer: Xiao Li, ayúdame a fotocopiar este documento cinco veces, se usará en la reunión dentro de un momento.\nHombre: De acuerdo, gerente, iré a hacerlo ahora mismo.\nMujer: Además, una vez fotocopiado, llévalo a la sala de reuniones del segundo piso y dámelo.\nHombre: Sin problema, gerente.", "pinyin": "nǚ: xiǎo lǐ, bāng wǒ bǎ zhè fèn cái liào fù yìn wǔ fèn, yī huì er kāi huì yào yòng.\nnán: hǎo de, jīng lǐ, wǒ xiàn zài jiù qù bàn.\nnǚ: hái yǒu, fù yìn hǎo le yǐ hòu ná dào èr lóu de huì yì shì gěi wǒ.\nnán: méi wèn tí, jīng lǐ." },
"4_3_1": { "zh": "男: 听说 你 去 参加 那个 比赛了? 结果 怎么样?\n女: 别提了, 刚 进去 就 被 淘汰了。\n男: 没关系, 以后 还有 机会, 别 难过。\n女: 我 没 难过, 就是 觉得 挺 遗憾的。", "es": "Hombre: ¿He oído que fuiste a participar en ese concurso? ¿Cómo quedó la cosa?\nMujer: Ni me lo hables, fui eliminada nada más entrar.\nHombre: No pasa nada, habrá más oportunidades en el futuro, no te pongas triste.\nMujer: No estoy triste, solo siento que es una lástima.", "pinyin": "nán: tīng shuō nǐ qù cān jiā nà ge bǐ sài le? jié guǒ zěn me yàng?\nnǚ: bié tí le, gāng jìn qù jiù bèi táo tài le.\nnán: méi guān xi, yǐ hòu hái yǒu jī huì, bié nán guò.\nnǚ: wǒ méi nán guò, jiù shì jué de tǐng yí hàn de." },
"4_3_2": { "zh": "女: 你的 皮肤 怎么 这么 好? 有 什么 特别的 方法 吗?\n男: 哪有 什么 特别 的 方法, 我 就是 每天 多 喝水, 多 吃 水果。\n女: 就 这么 简单?\n男: 对, 还有 要 保证 充足 的 睡眠。", "es": "Mujer: ¿Cómo es que tienes la piel tan bien? ¿Tienes algún método especial?\nHombre: Qué va a haber un método especial, yo simplemente bebo mucha agua y como mucha fruta todos los días.\nMujer: ¿Así de simple?\nHombre: Sí, y también hay que asegurar un sueño suficiente.", "pinyin": "nǚ: nǐ de pí fū zěn me zhè me hǎo? yǒu shén me tè bié de fāng fǎ ma?\nnán: nǎ yǒu shén me tè bié de fāng fǎ, wǒ jiù shì měi tiān duō hē shuǐ, duō chī shuǐ guǒ.\nnǚ: jiù zhè me jiǎn dān?\nnán: duì, hái yǒu yào bǎo zhèng chōng zú de shuì mián." },
"4_3_3": { "zh": "男: 这次 招聘 的 要求 挺 高的, 你 有 把握 吗?\n女: 虽然 我 毕业 的 学校 不是 最 有名的, 但 我的 工作 经验 丰富, 应该 没 问题。\n男: 祝 你 成功!\n女: 谢谢!", "es": "Hombre: Los requisitos para esta oferta de empleo son bastante altos, ¿estás segura?\nMujer: Aunque la escuela de la que me gradué no es la más famosa, mi experiencia laboral es rica, así que no debería haber problema.\nHombre: ¡Te deseo éxito!\nMujer: ¡Gracias!", "pinyin": "nán: zhè cì zhāo pìn de yāo qiú tǐng gāo de, nǐ yǒu bǎ wò ma?\nnǚ: suī rán wǒ bì yè de xué xiào bú shì zuì yǒu míng de, dàn wǒ de gōng zuò jīng yàn fēng fù, yīng gāi méi wèn tí.\nnán: zhù nǐ chéng gōng!\nnǚ: xiè xiè!" },
"4_3_4": { "zh": "男: 来 北方 好 几年 了 吧？你 觉得 北方 和 南方 在 气候 上 有 什么 区别？\n女: 夏天 都 差不多，只是 冬天 北方 比较 干燥，而 南方 更 湿润。", "es": "Hombre: Ya llevas varios años en el norte, ¿verdad? ¿Qué diferencias climáticas notas entre el norte y el sur? Mujer: En verano son más o menos iguales, solo que en invierno el norte es más seco, mientras que el sur es más húmedo.", "pinyin": "nán: lái běi fāng hǎo jǐ nián le ba? nǐ jué de běi fāng hé nán fāng zài qì hòu shàng yǒu shén me qū bié?\nnǚ: xià tiān dōu chà bù duō, zhǐ shì dōng tiān běi fāng bǐ jiào gān zào, ér nán fāng gèng shī rùn." },
"4_3_5": { "zh": "中国 南北 距离 约 5500 公里，因此 南北 气候 有 很大 区别。南方 很多 地方 的 冬天 一点儿 也 不 冷，温度 跟 北方 春天 差不多，二月 的 时候 已经 很 暖和，可以 只 穿 一件 毛衣 了，树 开始 长出 新 叶子，路边 的 花 也 开了，非常 漂亮。所以 很多 北方人 都 喜欢 这个 时候 出发 到 南方 旅游。不过 可惜 的 是，南方 很多 地方 冬天 都 看 不到 雪，孩子们 少 了 玩雪 的 快乐。", "es": "La distancia de norte a sur en China es de unos 5500 kilómetros, por lo que el clima del norte y del sur es muy diferente. En muchos lugares del sur, el invierno no es nada frío; la temperatura es similar a la primavera del norte. Ya en febrero hace bastante calor, se puede llevar solo un suéter, los árboles empiezan a echar hojas nuevas y las flores al borde del camino se abren, es muy bonito. Por eso, a muchos norteños les gusta viajar al sur en esta época. Sin embargo, es una lástima que en muchos lugares del sur no se vea nieve en invierno, y los niños pierden la alegría de jugar con ella.", "pinyin": "zhōng guó nán běi jù lí yuē wǔ qiān wǔ bǎi gōng lǐ, yīn cǐ nán běi qì hòu yǒu hěn dà qū bié. nán fāng hěn duō dì fang de dōng tiān yī diǎn er yě bù lěng, wēn dù gēn běi fāng chūn tiān chà bù duō, èr yuè de shí hou yǐ jīng hěn nuǎn huo, kě yǐ zhǐ chuān yī jiàn máo yī le, shù kāi shǐ zhǎng chū xīn yè zi, lù biān de huā yě kāi le, fēi cháng piào liang. suǒ yǐ hěn duō běi fāng rén dōu xǐ huān zhè ge shí hou chū fā dào nán fāng lǚ yóu. bú guò kě xī de shì, nán fāng hěn duō dì fang dōng tiān dōu kàn bú dào xuě, hái zi men shǎo le wán xuě de kuài lè." },
"4_4_1": { "zh": "女: 你 学习 功夫 多长时间 了?\n男: 从 六岁 开始, 到 现在 已经 二十多年 了。\n女: 一定 挺 辛苦、 挺 累的 吧?\n男: 是, 不过 回头 想想, 虽然 辛苦, 但 一切 都是 值得 的。", "es": "Mujer: ¿Cuánto tiempo llevas aprendiendo kung-fu?\nHombre: Empecé desde los seis años, y hasta ahora ya han pasado más de veinte años.\nMujer: Debe de ser muy duro y agotador, ¿verdad?\nHombre: Ciertamente lo es, pero mirando atrás, aunque fue difícil, todo ha valido la pena.", "pinyin": "nǚ: nǐ xué xí gōng fu duō cháng shí jiān le?\nnán: cóng liù suì kāi shǐ, dào xiàn zài yǐ jīng èr shí duō nián le.\nnǚ: yī dìng tǐng xīn kǔ, tǐng lèi de ba?\nnán: shì, bú guò huí tóu xiǎng xiǎng, suī rán xīn kǔ, dàn yī qiè dōu shì zhí de." },
"4_4_2": { "zh": "男: 小王 的 孩子 出生了? 男孩儿 还是 女孩儿?\n女: 女孩儿, 两周 前 出生的。\n男: 我 还没 来得及 去 祝贺 他 呢。\n女: 我 也 没 去, 哪天 我们 一起 去 吧。", "es": "Hombre: ¿Ha nacido el hijo de Xiao Wang? ¿Es niño o niña?\nMujer: Es una niña, nació hace dos semanas.\nHombre: Todavía no he tenido tiempo de ir a felicitarlo.\nMujer: Yo tampoco he ido, vayamos juntos un día de estos.", "pinyin": "nán: xiǎo wáng de hái zi chū shēng le? nán hái er hái shì nǚ hái er?\nnǚ: nǚ hái er, liǎng zhōu qián chū shēng de.\nnán: wǒ hái méi lái de jí qù zhù hè tā ne.\nnǚ: wǒ yě méi qù, nǎ tiān wǒ men yī qǐ qù ba." },
"4_4_3": { "zh": "女: 我们 去 趟 超市 吧, 明天 出去 玩儿 得 买 点儿 饼干 和 面包。\n男: 好, 还有 矿泉水、 果汁 什么 的。\n女: 对。 你 记得 拿 几个 塑料袋 放 车里, 到时候 用。\n男: 好的。", "es": "Mujer: Vamos al supermercado, mañana salimos a divertirnos y tenemos que comprar algunas galletas y pan.\nHombre: Bien, y también agua mineral, zumo de frutas y cosas así.\nMujer: Sí. Acuérdate de coger unas bolsas de plástico para ponerlas en el coche y usarlas cuando llegue el momento.\nHombre: De acuerdo.", "pinyin": "nǚ: wǒ men qù tàng chāo shì ba, míng tiān chū qù wán er děi mǎi diǎn er bǐng gān hé miàn bāo.\nnán: hǎo, hái yǒu kuàng quán shuǐ, guǒ zhī shén me de.\nnǚ: duì. nǐ jì de ná jǐ ge sù liào dài fàng chē lǐ, dào shí hou yòng.\nnán: hǎo de." },
"4_4_4": { "zh": "男: 你好, 我 想要 换 一些 零钱, 方便 吗?\n女: 您 好, 请问 您 想 怎么 换?\n男: 把 这张 一百的 换成 两张 五十的 吧。\n女: 好的, 给 您, 请 数 一下。", "es": "Hombre: Hola, me gustaría cambiar algo de dinero suelto, ¿le viene bien?\nMujer: Hola, disculpe, ¿cómo le gustaría cambiarlo?\nHombre: Cambie este billete de cien por dos de cincuenta.\nMujer: De acuerdo, aquí tiene, cuéntelo por favor.", "pinyin": "nán: nǐ hǎo, wǒ xiǎng yào huàn yī xiē líng qián, fāng biàn ma?\nnǚ: nín hǎo, qǐng wèn nín xiǎng zěn me huàn?\nnán: bǎ zhè zhāng yī bǎi de huàn chéng liǎng zhāng wǔ shí de ba.\nnǚ: hǎo de, gěi nín, qǐng shǔ yī xià." },
"4_4_5": { "zh": "幸福 是 什么？有人 说，能 帮助 别人 就是 一种 幸福。也 有人 说，健康 才 是 最大 的 幸福。还 有人 说，小时候 幸福 是 一件 东西，比如 一本 书、一块儿 巧克力，得到 了 就 很 幸福；长大 后 幸福 是 一种 态度，是 生活 的 态度 决定 了 我们 幸福感 的 高低。不管 你 认为 幸福 是 什么，只要 你 用心 去 找，就 一定 能 发现 它。", "es": "¿Qué es la felicidad? Algunos dicen que poder ayudar a los demás es una forma de felicidad. Otros dicen que la salud es la mayor felicidad. Y hay quienes dicen que, de niño, la felicidad es una cosa, como un libro o un trozo de chocolate; conseguirla te hace feliz. De adulto, la felicidad es una actitud; es la actitud ante la vida la que determina nuestro nivel de felicidad. Sea lo que sea que creas que es la felicidad, mientras la busques con el corazón, seguro que la encuentras.", "pinyin": "xìng fú shì shén me? yǒu rén shuō, néng bāng zhù bié rén jiù shì yī zhǒng xìng fú. yě yǒu rén shuō, jiàn kāng cái shì zuì dà de xìng fú. hái yǒu rén shuō, xiǎo shí hou xìng fú shì yī jiàn dōng xi, bǐ rú yī běn shū, yī kuài er qiǎo kè lì, dé dào le jiù hěn xìng fú; zhǎng dà hòu xìng fú shì yī zhǒng tài dù, shì shēng huó de tài dù jué dìng le wǒ men xìng fú gǎn de gāo dī. bù guǎn nǐ rèn wéi xìng fú shì shén me, zhǐ yào nǐ yòng xīn qù zhǎo, jiù yī dìng néng fā xiàn tā." },
"4_4_6": { "zh": "关于 读书, 有 两点 必须 要 注意: 第一, 书 不可 不 读。 书 会 让 系统的 知识 更 丰富, 生活 更 精彩。 第二, 不能 读 死书。 读书 的 时候, 如果 没有 一点儿 自己 的 想法 和 判断, 完全 相信 书本 上 的 内容, 那么 读书 对 自己 什么 帮助 都没有。", "es": "Respecto a la lectura, hay dos puntos que se deben tener en cuenta: Primero, no se puede dejar de leer libros. Los libros enriquecerán tus conocimientos y harán tu vida más espléndida. Segundo, no se debe leer de forma dogmática. Al leer, si uno no tiene sus propias ideas y juicios y cree completamente en el contenido del libro, entonces la lectura no servirá de ninguna ayuda para uno mismo.", "pinyin": "guān yú dú shū, yǒu liǎng diǎn bì xū yào zhù yì: dì yī, shū bù kě bù dú. shū huì ràng zì jǐ de zhī shi gèng fēng fù, shēng huó gèng jīng cǎi. dì èr, bù néng dú sǐ shū. dú shū de shí hou, rú guǒ méi yǒu yī diǎn er zì jǐ de xiǎng fǎ hé pàn duàn, wán quán xiāng xìn shū běn shàng de nèi róng, nà me dú shū duì zì jǐ shén me bāng zhù dōu méi yǒu." },
"4_5_1": { "zh": "女: 打了 一下午 羽毛球, 肚子 有点儿 饿了。男: 稍等 一会儿, 饭 马上 就好。\n女: 真 香, 今天 吃 什么?\n男: 你 鼻子 真好, 今晚 我们 吃 饺子。", "es": "Mujer: He estado jugando al bádminton toda la tarde, tengo un poco de hambre.\nHombre: Espera un momento, la comida estará lista enseguida.\nMujer: Qué bien huele, ¿qué comemos hoy?\nHombre: Qué buen olfato tienes, esta noche comemos empanadillas chinas.", "pinyin": "nǚ: dǎ le yī xià wǔ yǔ máo qiú, dù zi yǒu diǎn er è le.\nnán: shāo děng yī huì er, fàn mǎ shàng jiù hǎo.\nnǚ: zhēn xiāng, jīn tiān chī shén me?\nnán: nǐ bí zi zhēn hǎo, jīn wǎn wǒ men chī jiǎo zi." },
"4_5_2": { "zh": "女: 你好，请问 王师傅 在家 吗？\n男: 他 不 在家，他 游泳 去 了。\n女: 那 他 什么时候 回来 呢？\n男: 一会儿 就 回来 了 吧。\n女: 好 的，那 我 过 一会儿 再 联系 吧，打扰 了，再见。", "es": "Mujer: Hola, ¿el maestro Wang está en casa? Hombre: No está en casa, se fue a nadar. Mujer: ¿Y cuándo volverá? Hombre: Supongo que volverá en un rato. Mujer: De acuerdo, entonces me pondré en contacto más tarde. Disculpe las molestias, adiós.", "pinyin": "nǚ: nǐ hǎo, qǐng wèn wáng shī fu zài jiā ma?\nnán: tā bú zài jiā, tā yóu yǒng qù le.\nnǚ: nà tā shén me shí hou huí lái ne?\nnán: yī huì er jiù huí lái le ba.\nnǚ: hǎo de, nà wǒ guò yī huì er zài lián xì ba, dǎ rǎo le, zài jiàn." },
"4_5_3": { "zh": "男: 李 教授, 这 几篇 文章 您 什么时候 要?\n女: 不急, 你 自己 安排, 只要 在 寒假 前 交给 我 就行。\n男: 没问题, 我 肯定 会 提前 完成 的。\n女: 那样 更好。", "es": "Hombre: Profesor Li, ¿para cuándo quiere estos artículos?\nMujer: No hay prisa, organízate tú mismo, con tal de que me los entregues antes de las vacaciones de invierno es suficiente.\nHombre: No amblema, seguro que los terminaré con antelación.\nMujer: Eso sería todavía mejor.", "pinyin": "nán: lǐ jiào shòu, zhè jǐ piān wén zhāng nín shén me shí hou yào?\nnǚ: bù jí, nǐ zì jǐ ān pái, zhǐ yào zài hán jià qián jiāo gěi wǒ jiù xíng.\nnán: méi wèn tí, wǒ kěn dìng huì tí qián wán chéng de.\nnǚ: nà yàng gèng hǎo." },
"4_5_4": { "zh": "女: 先生, 这是 您的 房卡, 请 拿好。\n男: 谢谢! 我的 行李箱 在 哪儿 取 呢?\n女: 我们 一会儿 会 直接 送到 您的 房间。\n男: 谢谢! 麻烦 你们 了。\n女: 不客气。", "es": "Mujer: Señor, aquí tiene la tarjeta de su habitación, guárdela bien.\nHombre: ¡Gracias! ¿Dónde puedo recoger mi maleta?\nMujer: Se la enviaremos directamente a su habitación en un momento.\nHombre: ¡Gracias! Disculpen las molestias.\nMujer: De nada.", "pinyin": "nǚ: xiān sheng, zhè shì nín de fáng kǎ, qǐng ná hǎo.\nnán: xiè xiè! wǒ de xíng lǐ xiāng zài nǎ ér qǔ ne?\nnǚ: wǒ men yī huì er huì zhí jiē sòng dào nín de fáng jiān.\nnán: xiè xiè! má fan nǐ men le.\nnǚ: bú kè qì." },
"4_5_5": { "zh": "男: 你好, 我 想要 一个 窗户 旁边 的 座位, 还有 吗?\n女: 我 查 一下。 对不起, 您 乘坐 的 这个 航班 没有 窗户 边 的 座位 了。\n男: 好吧, 没关系。\n女: 给 您 票。", "es": "Hombre: Hola, me gustaría un asiento al lado de la ventana, ¿queda alguno?\nMujer: Déjeme comprobarlo. Lo siento, este vuelo en el que viaja ya no tiene asientos junto a la ventana.\nHombre: Está bien, no pasa nada.\nMujer: Aquí tiene su billete.", "pinyin": "nán: nǐ hǎo, wǒ xiǎng yào yí gè chuāng hu páng biān de zuò wèi, hái yǒu ma?\nnǚ: wǒ chá yī xià. duì bù qǐ, nín chéng zuò de zhè ge háng bān méi yǒu chuāng hu biān de zuò wèi le.\nnán: hǎo ba, méi guān xi.\nnǚ: gěi nín piào." },
"4_6_1": { "zh": "男: 你 工作 找得 怎么样 了？\n女: 挺 顺利 的，已经 定 下来 了。\n男: 太好 了！祝贺 你！什么时候 正式 上班？\n女: 七月 九号。", "es": "Hombre: ¿Cómo va tu búsqueda de trabajo? Mujer: Bastante bien, ya está decidido. Hombre: ¡Qué bien! ¡Felicidades! ¿Cuándo empiezas oficialmente? Mujer: El nueve de julio.", "pinyin": "nán: nǐ gōng zuò zhǎo de zěn me yàng le?\nnǚ: tǐng shùn lì de, yǐ jīng dìng xià lái le.\nnán: tài hǎo le! zhù hè nǐ! shén me shí hou zhèng shì shàng bān?\nnǚ: qī yuè jiǔ hào." },
