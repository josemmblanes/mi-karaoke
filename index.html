"4_6_2": { "zh": "女: 在 这儿 开 家 分店 怎么样?\n男: 我 刚才 也在 考虑, 周围 很多 写字楼, 但 没 几家 饭店。\n女: 估计 房租 不便宜。\n男: 咱们 先 了解 一下, 然后 再 决定 到底 要不要 开。", "es": "Mujer: ¿Qué tal si abrimos una sucursal aquí?\nHombre: Justo lo estaba pensando hace un momento, hay muchos edificios de oficinas alrededor, pero apenas hay restaurantes.\nMujer: Calculo que el alquiler no será barato.\nHombre: Informémonos primero, y luego decidamos si finalmente la abrimos o no.", "pinyin": "nǚ: zài zhè ér kāi jiā fēn diàn zěn me yàng?\nnán: wǒ gāng cái yě zài kǎo lǜ, zhōu wéi hěn duō xiě zì lóu, dàn méi jǐ jiā fàn diàn.\nnǚ: gū jì fáng zū bù pián yi.\nnán: zán men xiān liǎo jiě yī xià, rán hòu zài jué dìng dào dǐ yào bú yào kāi." },
"4_6_3": { "zh": "男: 这个 笑话 确实 有意思, 你 在 哪里 看到的?\n女: 有 一个 网站, 里面 有 很多 有趣的 笑话。\n男: 你 把 网址 发给我, 我 也 去 看看。\n女: 好的。", "es": "Hombre: Este chiste es verdaderamente interesante, ¿dónde lo viste?\nMujer: Hay una página web que tiene un montón de chistes divertidos.\nHombre: Pásame la dirección del sitio web, yo también iré a echar un vistazo.\nMujer: De acuerdo.", "pinyin": "nán: zhè ge xiào hua què shí yǒu yì si, nǐ zài nǎ lǐ kàn dào de?\nnǚ: yǒu yí gè wǎng zhàn, lǐ miàn yǒu hěn duō yǒu qù de xiào hua.\nnán: nǐ bǎ wǎng zhǐ fā gěi wǒ, wǒ yě qù kàn kan.\nnǚ: hǎo de." },
"4_6_4": { "zh": "女: 你 怎么 会 喜欢 看 京剧 呢?\n男: 小时候, 爷爷 差不多 每个月 都 带 我 去 看 一次 京剧。\n女: 京剧 的 内容 大多 是 历史 故事, 你 能 看懂?\n男: 爷爷 会 一边 看 一边 给 我 介绍, 让我 学了 很多 知识。", "es": "Mujer: ¿Cómo es que te gusta ver la ópera de Pekín?\nHombre: De pequeño, mi abuelo me llevaba a ver la ópera de Pekín casi todos los meses.\nMujer: El contenido de la ópera de Pekín son en su mayoría historias históricas, ¿puedes entenderlo?\nHombre: Mi abuelo me lo iba explicando mientras lo veíamos, lo que me hizo aprender muchos conocimientos.", "pinyin": "nǚ: nǐ zěn me huì xǐ huān kàn jīng jù ne?\nnán: xiǎo shí hou, yé ye chà bù duō měi gè yuè dōu dài wǒ qù kàn yī cì jīng jù.\nnǚ: jīng jù de nèi róng dà duō shì lì shǐ gù shi, nǐ néng kàn dǒng?\nnán: yé ye huì yī biān kàn yī biān gěi wǒ jiè shào, ràng wǒ xué le hěn duō zhī shi." },
"4_6_5": { "zh": "男: 喂？我 刚才 看 电视 上 说 今天 有 大雨，咱们 改天 再 去 植物园 吧。\n女: 好 啊，那 明天 怎么样？\n男: 明天 恐怕 也 不行，明天 是 我 爸 的 生日。\n女: 没 关系，那 我们 再 约 时间。", "es": "Hombre: ¿Oye? Acabo de ver en la tele que hoy habrá lluvia fuerte. Mejor vayamos al jardín botánico otro día. Mujer: Vale, ¿y qué tal mañana? Hombre: Mañana tampoco podré, es el cumpleaños de mi padre. Mujer: No pasa nada, entonces acordamos otro momento.", "pinyin": "nán: wèi? wǒ gāng cái kàn diàn shì shàng shuō jīn tiān yǒu dà yǔ, zán men gǎi tiān zài qù zhí wù yuán ba.\nnǚ: hǎo a, nà míng tiān zěn me yàng?\nnán: míng tiān kǒng pà yě bù xíng, míng tiān shì wǒ bà de shēng rì.\nnǚ: méi guān xi, nà wǒ men zài yuē shí jiān." },
"4_6_6": { "zh": "女: 你 看见 我 的 手表 没？\n男: 没有，是不是 忘 在 宾馆 了？\n女: 不会，肯定 没 忘 在 宾馆，我 印象 里 上车 的 时候 还 戴着 呢。\n男: 那 看看 在 不在 你 包 里，不会 丢 在 出租车 上 吧？", "es": "Mujer: ¿Has visto mi reloj? Hombre: No, ¿lo habrás olvidado en el hotel? Mujer: No, seguro que no lo olvidé en el hotel, recuerdo que lo llevaba puesto al subir al coche. Hombre: Entonces mira si está en tu bolso, ¿no lo habrás perdido en el taxi?", "pinyin": "nǚ: nǐ kàn jiàn wǒ de shǒu biǎo méi?\nnán: méi yǒu, shì bú shì wàng zài bīn guǎn le?\nnǚ: bú huì, kěn dìng méi wàng zài bīn guǎn, wǒ yìn xiàng lǐ shàng chē de shí hou hái dài zhe ne.\nnán: nà kàn kan zài bú zài nǐ bāo lǐ, bú huì diū zài chū zū chē shàng ba?" },
"4_6_7": { "zh": "男: 你 怎么了?\n女: 我们 本来 说 明天 提前 放假的, 刚才 突然 又 说 有 变化, 让 等 通知。\n男: 那 就 等一等 好了, 也许 一会儿 就有 好消息 了。\n女: 也 只好 这样了。", "es": "Hombre: ¿Qué te ocurre?\nMujer: Originalmente nos habían dicho que mañana salíamos de vacaciones antes de tiempo, pero hace un momento de repente dijeron que hay cambios y que esperemos el aviso.\nHombre: Pues entonces espera un poco, a lo largo de un rato tal vez haya buenas noticias.\nMujer: No queda más remedio que hacer eso.", "pinyin": "nán: nǐ zěn me le?\nnǚ: wǒ men běn lái shuō míng tiān tí qián fàng jià de, gāng cái tū rán yòu shuō yǒu biàn huà, ràng děng tōng zhī.\nnán: nà jiù děng yī děng hǎo le, yě xǔ yī huì er jiù yǒu hǎo xiāo xi le.\nnǚ: yě zhǐ hǎo zhè yàng le." },
"4_7_1": { "zh": "六 到 八岁 的 儿童 普遍 好动, 坐不住, 所以 老师 在 教 这个 年龄段 的 孩子 时, 一定 要 想 办法 引起 系统的 兴趣。 只有 让他们 觉得 你 教 的 内容 有趣, 他们 才会 愿意 跟 你 学, 才 肯 努力地 学。", "es": "Los niños de seis a ocho años son generalmente muy activos y no pueden quedarse quietos, por lo que los profesores, al enseñar a niños de este rango de edad, deben encontrar maneras de despertar su interés. Solo cuando sientan que el contenido que enseñas es interesante, estarán dispuestos a aprender de ti y se esforzarán por estudiar.", "pinyin": "liù dào bā suì de ér tóng pǔ biàn hào dòng, zuò bú zhù, suǒ yǐ lǎo shī zài jiào zhè ge nián líng duàn de hái zi shí, yī dìng yào xiǎng bàn fǎ yǐn qǐ tā men de xìng qù. zhǐ yǒu ràng tā men jué de nǐ jiào de nèi róng yǒu qù, tā men cái huì yuàn yì gēn nǐ xué, cái kěn nǔ lì de xué." },
"4_7_2": { "zh": "我 最近 右眼 总是 跳, 医生 说 是因为 我 长时间 面对 电脑, 眼睛 太 累了。 确实, 我 最近 准备 考试, 每天 都要 在 电脑 前 坐 七八个 小时。 看来 我 应该 听 医生 的 话, 多 出去 走走, 让 眼睛 休息 休息。", "es": "Últimamente siempre me tiembla el ojo derecho, el médico dice que es porque paso mucho tiempo frente al ordenador y mis ojos están demasiado cansados. Efectivamente, he estado preparando un examen recientemente y paso de siete a ocho horas al día sentado frente al ordenador. Parece que debería hacer caso al médico, salir a caminar más y dejar descansar los ojos.", "pinyin": "wǒ zuì jìn yòu yǎn zǒng shì tiào, yī shēng shuō shì yīn wèi wǒ cháng shí jiān miàn duì diàn nǎo, yǎn jīng tài lèi le. què shí, wǒ zuì jìn zhǔn bèi kǎo shì, měi tiān dōu yào zài diàn nǎo qián zuò qī bā gè xiǎo shí. kàn lái wǒ yīng gāi tīng yī shēng de huà, duō chū qù zǒu zǒu, ràng yǎn jīng xiū xi xiū xi." },
"4_7_3": { "zh": "每个 人 都 需要 学习 怎么 花钱。收入 再 多，乱花钱 也 会 成为 月光族。会 花钱 的 人，即使 收入 不多，也 能 让 自己 生活 得 舒服，甚至 还 能 剩下 不少 钱。一定 要 根据 实际 收入 情况 来 做 计划，使 每 一分钱 都 花 在 该 花 的 地方 上。", "es": "Todos necesitan aprender a gastar dinero. Por muchos ingresos que tengas, si gastas sin control, terminarás siendo un \"mileurista\" (que gasta todo su sueldo). Quien sabe gastar, aunque tenga pocos ingresos, puede vivir cómodamente e incluso ahorrar bastante. Hay que hacer un plan según los ingresos reales, para que cada centavo se gaste en lo que realmente debe gastarse.", "pinyin": "měi gè rén dōu xū yào xué xí zěn me huā qián. shōu rù zài duō, luàn huā qián yě huì chéng wéi yuè guāng zú. huì huā qián de rén, jí shǐ shōu rù bù duō, yě néng ràng zì jǐ shēng huó de shū fu, shèn zhì hái néng shèng xià bù shǎo qián. yī dìng yào gēn jù shí jì shōu rù qíng kuàng lái zuò jì huà, shǐ měi yī fēn qián dōu huā zài gāi huā de dì fang shàng." },
"4_7_4": { "zh": "即使 收入 不多, 也能 让自己 生活得 舒服, 甚至 还能 剩下 不少 钱。 一定 要 根据 实际 收入 情况 来 做 计划, 使 每一分 钱 都 花在 该 花 的 地方 上。", "es": "Todo el mundo necesita aprender cómo gastar dinero. Por muchos ingresos que se tengan, gastar a lo loco te convertirá en un esclavo del sueldo mensual (alguien que gasta todo lo que gana). Las personas que saben gastar, aunque sus ingresos no sean altos, pueden vivir cómodamente e incluso ahorrar bastante dinero. Hay que hacer planes según la situación real de los ingresos, para que cada céntimo se gaste en el lugar donde corresponda.", "pinyin": "jí shǐ shōu rù bù duō, yě néng ràng zì jǐ shēng huó de shū fu, shèn zhì hái néng shèng xià bù shǎo qián. yī dìng yào gēn jù shí jì shōu rù qíng kuàng lái zuò jì huà, shǐ měi yī fēn qián dōu huā zài gāi huā de dì fang shàng." },
"4_8_1": { "zh": "王小姐 在 商场 买 裙子。 她 从 试衣间 出来 后, 售货员 说: “您 穿 这条 裙子 有点儿 大。” 王小姐 却 说: “那 太好了, 我 就 买 这条。” 售货员 感到 很 奇怪, 王小姐 解释 说: “我 穿上 它, 朋友 见了 肯定 会 说 我 减肥 成功了。”", "es": "La señorita Wang está comprando una falda en el centro comercial. Al salir del probador, la dependienta le dice: “Le queda un poco grande esta falda”. Sin embargo, la señorita Wang responde: “¡Perfecto, me llevo esta misma!”. La dependienta se queda muy extrañada y la señorita Wang le explica: “Si me la pongo, seguro que mis amigos dirán que he tenido éxito al adelgazar cuando me vean”.", "pinyin": "wáng xiǎo jie zài shāng chǎng mǎi qún zi. tā cóng shì yī jiān chū lái hòu, shòu huò yuán shuō: \"nín chuān zhè tiáo qún zi yǒu diǎn er dà.\" wáng xiǎo jie què shuō: \"nà tài hǎo le, wǒ jiù mǎi zhè tiáo.\" shòu huò yuán gǎn dào hěn qí guài, wáng xiǎo jie jiě shì shuō: \"wǒ chuān shàng tā, péng you jiàn le kěn dìng huì shuō wǒ jiǎn féi chéng gōng le.\"" },
"4_8_2": { "zh": "我 刚 看了 这个 照相机 的 使用 说明书, 介绍得 非常 详细, 尤其是 “常见 问题” 那 部分, 总结了 许多 使用 过程 中 容易 出现 的 错误, 我 觉得 很有用, 你 也 看看 吧。", "es": "Acabo de leer el manual de instrucciones de esta cámara, viene explicado de forma muy detallada, especialmente la sección de 'Preguntas frecuentes', donde se resumen muchos errores comunes durante su uso; creo que es muy útil, tú también deberías echarle un vistazo.", "pinyin": "wǒ gāng kàn le zhè ge zhào xiàng jī de shǐ yòng shuō míng shū, jiè shào de fēi cháng xiáng xì, yóu qí shì \"cháng jiàn wèn tí\" nà bù fen, zǒng jié le xǔ duō shǐ yòng guò chéng zhōng róng yì chū xiàn de cuò wù, wǒ jué de hěn yǒu yòng, nǐ yě kàn kan ba." },
"4_8_3": { "zh": "小晴 是 我 最好 的 朋友，我俩 从 小 一块儿 长大，后来 还 在 同一个 大学 读书。她 今年 申请 了 出国留学，下个月 六号 就 要 走 了，我 很 为 她 感到 高兴，可是 一想到 我们 就要 分开 了，心里 又 有些 难过。", "es": "Xiaoqing es mi mejor amiga. Hemos crecido juntas desde pequeñas y luego estudiamos en la misma universidad. Este año solicitó estudiar en el extranjero y se va el seis del mes que viene. Me alegro mucho por ella, pero cada vez que pienso que vamos a separarnos, siento un poco de tristeza.", "pinyin": "xiǎo qíng shì wǒ zuì hǎo de péng you, wǒ liǎ cóng xiǎo yī kuài er zhǎng dà, hòu lái hái zài tóng yí gè dà xué dú shū. tā jīn nián shēn qǐng le chū guó liú xué, xià gè yuè liù hào jiù yào zǒu le, wǒ hěn wèi tā gǎn dào gāo xìng, kě shì yī xiǎng dào wǒ men jiù yào fēn kāi le, xīn lǐ yòu yǒu xiē nán guò." },
"4_8_4": { "zh": "爷爷 非常 喜欢 京剧, 每晚 都会 和 朋友 去 公园 唱上 几段。 尽管 他们 并不 专业, 但 唱得 很 认真, 每次 都会 吸引 很多 人 在 一旁 观看, 甚至 还有人 想 跟着 他们 学。 最近, 他们 正 商量 教课 的 事情 呢。", "es": "Al abuelo le chifla la ópera de Pekín, todas las noches va al parque con sus amigos a cantar unas cuantas estrofas. A pesar de que no son profesionales, cantan con mucha seriedad, atrayendo siempre a mucha gente a mirar a su alrededor, e incluso hay personas que quieren aprender de ellos. Últimamente están discutiendo el asunto de dar clases.", "pinyin": "yé ye fēi cháng xǐ huān jīng jù, měi wǎn dōu huì hé péng you qù gōng yuán chàng shàng jǐ duàn. jǐn guǎn tā men bìng bù zhuān yè, dàn chàng de hěn rèn zhēn, měi cì dōu huì xī yǐn hěn duō rén zài yī páng guān kàn, shèn zhì hái yǒu rén xiǎng gēn zhe tā men xué. zuì jìn, tā men zhèng shāng liáng jiāo kè de shì qíng ne." },
"4_9_1": { "zh": "男: 您 能 给 我们 介绍 一些 您 的 成功 经验 吗?\n女: 我 觉得 要 重视 平时 的 积累, 要 多 向 周围 的 人 学习。\n男: 那 您 觉得 您 最大 的 优点 是 一个 什么 呢?\n女: 是 诚实。", "es": "Hombre: ¿Podría presentarnos algunas de sus experiencias de éxito?\nMujer: Creo que hay que dar importancia a la acumulación diaria y aprender más de las personas que nos rodean.\nHombre: ¿Y cuál considera que es su mayor virtud?\nMujer: La honestidad.", "pinyin": "nán: nín néng gěi wǒ men jiè shào yī xiē nín de chéng gōng jīng yàn ma?\nnǚ: wǒ jué de yào zhòng shì píng shí de jī lěi, yào duō xiàng zhōu wéi de rén xué xí.\nnán: nà nín jué de nín zuì dà de yōu diǎn shì yí gè shén me ne?\nnǚ: shì chéng shí." },
"4_9_2": { "zh": "女: 大学 毕业 后 就 没 联系了, 你 现在 在 哪儿 工作 呢?\n男: 毕业 后 在 老家 工作了 一年, 然后 又 考上了 北京 大学, 读 研究生。\n女: 真 厉害! 是 硕士了。 你 读 什么 专业? 几年?\n男: 教育学, 三年。", "es": "Mujer: No hemos estado en contacto desde la graduación universitaria, ¿dónde trabajas ahora?\nHombre: Después de graduarme trabajé un año en mi tierra natal, y luego aprobé los exámenes para la Universidad de Pekín, para estudiar un posgrado.\nMujer: ¡Qué increíble! Ya eres estudiante de maestría. ¿Qué especialidad estudias? ¿Cuántos años?\nHombre: Pedagogía, tres años.", "pinyin": "nǚ: dà xué bì yè hòu jiù méi lián xì le, nǐ xiàn zài zài nǎ ér gōng zuò ne?\nnán: bì yè hòu zài lǎo jiā gōng zuò le yī nián, rán hòu yòu kǎo shàng le běi jīng dà xué, dú yán jiū shēng.\nnǚ: zhēn lì hai! shì shuò shì le. nǐ dú shén me zhuān yè? jǐ nián?\nnán: jiào yù xué, sān nián." },
"4_9_3": { "zh": "我们 能够 快速、 积极地 找到 问题 的 原因, 及时地 解决 问题, 保质保量地 完成 任务。 非常 感谢 大家 对 我的 支持!", "es": "Nuestra misión ya se ha completado por entero conforme al plan. Durante este período de tiempo, a pesar de que la presión laboral ha sido enorme y nos hemos topado con muchas dificultades en el camino, gracias al apoyo de todos hemos podido encontrar de forma rápida y positiva la causa de los problemas, solucionarlos a tiempo y cumplir la tarea asegurando la calidad y la cantidad. ¡Muchísimas gracias a todos por vuestro apoyo!", "pinyin": "wǒ men néng gòu kuài sù, jī jí de zhǎo dào wèn tí de yuán yīn, jí shí de jiě jué wèn tí, bǎo zhì bǎo liàng de wán chéng rèn wu. fēi cháng gǎn xiè dà jiā duì wǒ de zhī chí!" },
"4_9_4": { "zh": "舞会 上 最好 不要 直接 拒绝 别人的 邀请, 如果 不得不 拒绝, 可以 告诉 他: “我 有些 累了, 想 休息 一下。” 之后 也不要 很快 又 接受 其他人 的 邀请。", "es": "En los bailes es mejor no rechazar directamente la invitación de los demás, si no queda más remedio que rechazarla, puedes decirle: “Estoy un poco cansado, quiero descansar un momento”. Después de eso tampoco debes aceptar muy rápido la invitación de otra persona.", "pinyin": "wǔ huì shàng zuì hǎo bú yào zhí jiē jù jué bié rén de yāo qǐng, rú guǒ bù dé bù jù jué, kě yǐ gào sù tā: \"wǒ yǒu xiē lèi le, xiǎng xiū xi yī xià.\" zhī hòu yě bú yào hěn kuài yòu jiē shòu qí tā rén de yāo qǐng." },
"4_10_1": { "zh": "北风 与 南风 为了 比 谁 更 有 能力 而 吵 了 起来。它们 决定，谁 能 把 人们 身上 的 大衣 脱掉，谁 就 赢了。北风 一开始 就 很 用力，但是 它 刮得 越 厉害，路上 的 人们 感到 越 冷，就 越 不会 脱掉 衣服。南风 却 不一样，南风 一来，春暖花开，温度 也 越来越 高，人们 因为 觉得 暖和，于是 脱掉 了 大衣。最终，南风 赢得 了 比赛。", "es": "El viento del Norte y el viento del Sur discutían para ver quién era más capaz. Decidieron que ganaría quien consiguiera que la gente se quitara el abrigo. El viento del Norte sopló con mucha fuerza desde el principio, pero cuanto más fuerte soplaba, más frío sentía la gente en la calle y menos se quitaba la ropa. El viento del Sur, en cambio, era diferente. Cuando llegaba el viento del Sur, llegaba la primavera y florecían las flores, la temperatura subía cada vez más, y la gente, porque sentía calor, se quitaba el abrigo. Finalmente, el viento del Sur ganó la competición.", "pinyin": "běi fēng yǔ nán fēng wèi le bǐ shuí gèng yǒu néng lì ér chǎo le qǐ lái. tā men jué dìng, shuí néng bǎ rén men shēn shàng de dà yī tuō diào, shuí jiù yíng le. běi fēng yī kāi shǐ jiù hěn yòng lì, dàn shì tā guā de yuè lì hai, lù shàng de rén men gǎn dào yuè lěng, jiù yuè bú huì tuō diào yī fu. nán fēng què bù yī yàng, nán fēng yī lái, chūn nuǎn huā kāi, wēn dù yě yuè lái yuè gāo, rén men yīn wèi jué de nuǎn huo, yú shì tuō diào le dà yī. zuì zhōng, nán fēng yíng dé le bǐ sài." },
"4_10_2": { "zh": "快 过年 了，放假 那天，老李 开着 新买 的 车 回家。由于 急着 回家，他 把 车 开得 很快。在 一个 十字路口，一位 交通警察 让 他 停车。老李 下了 车，很 抱歉 地 对 交警 说：\"对不起，我 错了，我 知道 我 的 速度 太快 了。\"交警 回答 他：\"不，你 是 飞得 太 低 了！\"", "es": "Ya casi era Año Nuevo. El día de las vacaciones, el viejo Li conducía su coche nuevo de vuelta a casa. Como tenía prisa por llegar, iba muy rápido. En un cruce, un policía de tráfico le hizo parar. El viejo Li bajó del coche y le dijo muy apenado al policía: \"Lo siento, he cometido un error, sé que iba demasiado rápido\". El policía le respondió: \"No, ¡es que volabas demasiado bajo!\"", "pinyin": "kuài guò nián le, fàng jià nà tiān, lǎo lǐ kāi zhe xīn mǎi de chē huí jiā. yóu yú jí zhe huí jiā, tā bǎ chē kāi de hěn kuài. zài yí gè shí zì lù kǒu, yī wèi jiāo tōng jǐng chá ràng tā tíng chē. lǎo lǐ xià le chē, hěn bào qiàn de duì jiǎo jǐng shuō: \"duì bù qǐ, wǒ cuò le, wǒ zhī dào wǒ de sù dù tài kuài le.\" jiǎo jǐng huí dá tā: \"bù, nǐ shì fēi de tài dī le!\"" },
"4_10_3": { "zh": "中国 有 句话 叫 \"不管三七二十一\"，意思 是 说 一个 人 不管 现有 条件 怎么样，也 不 考虑 最终 的 结果，就 做 起 事 来，这样 往往 会 白费 力气，得 不到 自己 想要 的 结果。", "es": "En China hay un dicho que dice \"sin importar tres, siete, veintiuno\" (bùguǎn sān qī èrshíyī), que significa que una persona, sin importar cuáles sean las condiciones actuales ni considerar el resultado final, se pone a hacer algo. Así, a menudo acaba malgastando esfuerzos y no consigue el resultado que desea.", "pinyin": "zhōng guó yǒu jù huà jiào \"bù guǎn sān qī èr shí yī\", yì si shì shuō yí gè rén bù guǎn xiàn yǒu tiáo jiàn zěn me yàng, yě bù kǎo lǜ zuì zhōng de jié guǒ, jiù zuò qǐ shì lái, zhè yàng wǎng wǎng huì bái fèi lì qi, dé bú dào zì jǐ xiǎng yào de jié guǒ." },
"4_10_4": { "zh": "要 想 更快 适应 新 环境，其实 有 很多 办法。例如 多 和 周围 的 人 打招呼，在 别人 遇到 麻烦 的 时候 去 帮 一把，或者 跟 别人 聊聊 他 感兴趣 的 事，这些 都 可以 让 身边 的 人 更快 地 接受 你。", "es": "Si quieres adaptarte más rápido a un nuevo entorno, en realidad hay muchas maneras. Por ejemplo, saludar más a la gente de alrededor, echar una mano cuando alguien tenga algún problema, o hablar con los demás sobre cosas que les interesen. Todo esto puede hacer que la gente de tu alrededor te acepte más rápidamente.", "pinyin": "yào xiǎng gèng kuài shì yìng xīn huán jìng, qí shí yǒu hěn duō bàn fǎ. lì rú duō hé zhōu wéi de rén dǎ zhāo hu, zài bié rén yù dào má fan de shí hou qù bāng yī bǎ, huò zhě gēn bié rén liáo liao tā gǎn xìng qù de shì, zhè xiē dōu kě yǐ ràng shēn biān de rén gèng kuài de jiē shòu nǐ." },
"4_10_5": { "zh": "小蓝，你 把 这些 材料 按照 时间 顺序 整理 一下，中午 吃饭 前 交给 我 就行。另外，关医生 回来 后，让 她 来 我 办公室 一趟。", "es": "Xiao Lan, ordena estos materiales según el orden cronológico y entrégamelos antes de la hora de comer. Además, cuando vuelva la doctora Guan, dile que pase por mi despacho.", "pinyin": "xiǎo lán, nǐ bǎ zhè xiē cái liào àn zhào shí jiān shùn xù zhěng lǐ yī xià, zhōng wǔ chī fàn qián jiāo gěi wǒ jiù xíng. lìng wài, guān yī shēng huí lái hòu, ràng tā lái wǒ bàn gōng shì yī tàng." },
"4_11_1": { "zh": "小周，你 这个 总结 写得 不错，尤其 是 公司 这一年 的 发展 情况 和 取得 的 成绩 这 两部分，内容 很 详细。但是 还有 几个 地方 需要 改 一下，比如 一些 大事 的 排列 顺序 等等。我 都 帮 你 画 出来 了，你 改完 再 重新 发 我 一份。", "es": "Xiao Zhou, este resumen que has escrito está bastante bien, especialmente las dos partes sobre la situación del desarrollo de la empresa durante este año y los logros obtenidos, el contenido es muy detallado. Pero aún hay algunos lugares que necesitan modificarse, como por ejemplo el orden de los acontecimientos importantes, etc. Ya te lo he marcado todo. Cuando termines de corregirlo, envíame otra copia.", "pinyin": "xiǎo zhōu, nǐ zhè ge zǒng jié xiě de bú cuò, yóu qí shì gōng sī zhè yī nián de fā zhǎn qíng kuàng hé qǔ dé de chéng jì zhè liǎng bù fen, nèi róng hěn xiáng xì. dàn shì hái yǒu jǐ ge dì fang xū yào gǎi yī xià, bǐ rú yī xiē dà shì de pái liè shùn xù děng děng. wǒ dōu bāng nǐ huà chū lái le, nǐ gǎi wán zài chóng xīn fā wǒ yī fèn." },
"4_11_2": { "zh": "一个 城市 的 交通，反映 这个 城市 的 经济 发展 水平，尤其 是 公共 交通，对 社会 的 发展 有 很大 影响。", "es": "El transporte de una ciudad refleja el nivel de desarrollo económico de esa ciudad. Especialmente el transporte público, tiene una gran influencia en el desarrollo de la sociedad.", "pinyin": "yí gè chéng shì de jiāo tōng, fǎn yìng zhè ge chéng shì de jīng jì fā zhǎn shuǐ píng, yóu qí shì gōng gòng jiāo tōng, duì shè huì de fā zhǎn yǒu hěn dà yǐng xiǎng." },
"4_11_3": { "zh": "怎么样 才能 找到 适合 自己 的 人？两个 人 共同 生活，不仅 需要 浪漫 的 爱情，更 需要 性格 上 互相 吸引，最 重要 的 是，两个 人 都 要 有 对 家 的 责任感。", "es": "¿Cómo encontrar a la persona adecuada para uno? Dos personas que viven juntas no solo necesitan un amor romántico, sino que necesitan aún más atraerse mutuamente por su carácter. Lo más importante es que ambos tengan sentido de responsabilidad hacia el hogar.", "pinyin": "zěn me yàng cái néng zhǎo dào shì hé zì jǐ de rén? liǎng ge rén gòng tóng shēng huó, bù jǐn xū yào làng màn de ài qíng, gèng xū yào xìng gé shàng hù xiāng xī yǐn, zuì zhòng yào de shì, liǎng ge rén dōu yào yǒu duì jiā de zé rèn gǎn." },
"4_11_4": { "zh": "现在，做 一个 网站 变得 越来越 容易 了。不仅 许多 公司 有 网站，而且 很多 人 都 有 自己 的 网站。访问 各种 各样 的 网站 已经 成为 人们 生活 的 一部分，网站 极大 地 丰富 了 现代人 的 精神 生活。", "es": "Ahora, hacer una página web se está volviendo cada vez más fácil. No solo muchas empresas tienen páginas web, sino que además muchas personas tienen las suyas propias. Visitar todo tipo de páginas web ya se ha convertido en parte de la vida de las personas. Las páginas web han enriquecido enormemente la vida espiritual de la gente moderna.", "pinyin": "xiàn zài, zuò yí gè wǎng zhàn biàn de yuè lái yuè róng yì le. bù jǐn xǔ duō gōng sī yǒu wǎng zhàn, ér qiě hěn duō rén dōu yǒu zì jǐ de wǎng zhàn. fǎng wèn gè zhǒng gè yàng de wǎng zhàn yǐ jīng chéng wéi rén men shēng huó de yī bù fen, wǎng zhàn jí dà de fēng fù le xiàn dài rén de jīng shén shēng huó." },
"4_11_5": { "zh": "北京 公交卡 的 使用 范围 越来越 大 了，不仅 可以 坐 地铁、坐 公共汽车，还 可以 在 许多 超市 刷卡 购物，非常 方便。", "es": "El ámbito de uso de la tarjeta de transporte público de Pekín es cada vez mayor. No solo se puede usar para tomar el metro y el autobús, sino que también se puede utilizar para pagar en muchos supermercados con tarjeta, es muy cómodo.", "pinyin": "běi jīng gōng jiāo kǎ de shǐ yòng fàn wéi yuè lái yuè dà le, bù jǐn kě yǐ zuò dì tiě, zuò gōng gòng qì chē, hái kě yǐ zài xǔ duō chāo shì shuā kǎ gòu wù, fēi cháng fāng biàn." },
"4_11_6": { "zh": "努力 把 事情 做到 最好，这 无疑 是 对的。不过，当 别人 请 你 帮忙 时，对 那些 超出 自己 能力 范围 的 事情，最好 还是 先 考虑 考虑。否则，最后 事情 没 办成，不仅 自己 觉得 丢脸，而且 别人 有 可能 不再 信任 你。", "es": "Esforzarse por hacer las cosas lo mejor posible, sin duda es correcto. Sin embargo, cuando otros te piden ayuda, para aquellas cosas que superan el alcance de tus capacidades, es mejor que lo pienses primero. De lo contrario, si al final no consigues resolverlo, no solo te sentirás avergonzado, sino que además los demás posiblemente dejarán de confiar en ti.", "pinyin": "nǔ lì bǎ shì qíng zuò dào zuì hǎo, zhè wú yí shì duì de. bú guò, dāng bié rén qǐng nǐ bāng máng shí, duì nà xiē chāo chū zì jǐ néng lì fàn wéi de shì qíng, zuì hǎo hái shì xiān kǎo lǜ kǎo lǜ. fǒu zé, zuì hòu shì qíng méi bàn chéng, bù jǐn zì jǐ jué de diū liǎn, ér qiě bié rén yǒu kě néng bú zài xìn rèn nǐ." },
"4_11_7": { "zh": "小时候，他 希望 自己 将来 成为 一名 勇敢 的 警察。长大 后，他 却 成为 一名 优秀 的 律师，用 自己 的 法律 知识 来 帮助 别人。", "es": "Cuando era pequeño, esperaba llegar a ser un valiente policía en el futuro. Al crecer, sin embargo, se convirtió en un excelente abogado, usando sus conocimientos de leyes para ayudar a los demás.", "pinyin": "xiǎo shí hou, tā xī wàng zì jǐ jiāng lái chéng wéi yī míng yǒng gǎn de jǐng chá. zhǎng dà hòu, tā què chéng wéi yī míng yōu xiù de lǜ shī, yòng zì jǐ de fǎ lǜ zhī shi lái bāng zhù bié rén." },
"4_12_1": { "zh": "我们 可以 通过 身体 动作 表达 很多 感情，例如：害羞 时 我们 会 低下 头，激动 时 我们 会 抬起 头，鼓掌 可以 表示 欢迎，用力 地 握手 表示 信任……当然，不同 地方 人们 的 身体 语言 可能 是 不一样 的，如果 你 不 了解，还 可能 引起 误会。", "es": "Podemos expresar muchos sentimientos a través de los movimientos del cuerpo. Por ejemplo: cuando estamos tímidos bajamos la cabeza, cuando estamos emocionados levantamos la cabeza, aplaudir puede significar bienvenida, estrechar la mano con fuerza significa confianza... Claro está, el lenguaje corporal de la gente de diferentes lugares puede ser diferente, y si no lo conoces, incluso puede causar malentendidos.", "pinyin": "wǒ men kě yǐ tōng guò shēn tǐ dòng zuò biǎo dá hěn duō gǎn qíng, lì rú: hài xiū shí wǒ men huì dī xià tóu, jī dòng shí wǒ men huì tái qǐ tóu, gǔ zhǎng kě yǐ biǎo shì huān yíng, yòng lì de wò shǒu biǎo shì xìn rèn...... dāng rán, bù tóng dì fang rén men de shēn tǐ yǔ yán kě néng shì bù yī yàng de, rú guǒ nǐ bù liǎo jiě, hái kě néng yǐn qǐ wù huì." },
"4_12_2": { "zh": "学习 一种 语言 不是 简单 的 事情，许多 人 在 开始 学 的 时候 觉得 很 困难，于是 就 放弃 了。但是 只要 坚持 下来，从 最 基础 的 东西 学起，慢慢 就 会 发现 自己 的 变化。这 时候 就 会 增加 我们 的 信心，离 学好 这种 语言 也 就 越来越 近 了。", "es": "Aprender un idioma no es algo sencillo. Muchas personas, cuando empiezan a aprenderlo, lo encuentran muy difícil y entonces lo abandonan. Pero si uno persevera, empieza a aprender desde lo más básico, poco a poco irá descubriendo sus propios cambios. En ese momento aumentará nuestra confianza y estaremos cada vez más cerca de dominar bien ese idioma.", "pinyin": "xué xí yī zhǒng yǔ yán bú shì jiǎn dān de shì qíng, xǔ duō rén zài kāi shǐ xué de shí hou jué de hěn kùn nan, yú shì jiù fàng qì le. dàn shì zhǐ yào jiān chí xià lái, cóng zuì jī chǔ de dōng xi xué qǐ, màn man jiù huì fā xiàn zì jǐ de biàn huà. zhè shí hou jiù huì zēng jiā wǒ men de xìn xīn, lí xué hǎo zhè zhǒng yǔ yán yě jiù yuè lái yuè jìn le." },
"4_12_3": { "zh": "教育 孩子 要 使用 正确 的 方法。首先，不要 用 \"懒\"\"笨\"\"粗心\" 这种 词 批评 孩子，这样 很 容易 让 他们 相信 自己 就是 那样 的，于是 限制 了 他们 正常 的 发展。其次，即使 是 出于 教育 的 目的，也 千万 不能 骗 孩子，因为 儿童 缺少 判断 能力，看到 父母 骗人，他们 也 会 学着 说 假话。", "es": "Para educar a los hijos hay que usar el método correcto. En primer lugar, no se deben usar palabras como \"perezoso\", \"torpe\" o \"descuidado\" para criticar a los niños, porque eso les hace creer fácilmente que son así, y así se limita su desarrollo normal. En segundo lugar, aunque sea con fines educativos, nunca se debe engañar a los niños, porque los niños carecen de capacidad de juicio; al ver que sus padres mienten, ellos también aprenderán a decir mentiras.", "pinyin": "jiào yù hái zi yào shǐ yòng zhèng què de fāng fǎ. shǒu xiān, bú yào yòng \"lǎn\" \"bèn\" \"cū xīn\" zhè zhǒng cí pī píng hái zi, zhè yàng hěn róng yì ràng tā men xiāng xìn zì jǐ jiù shì nà yàng de, yú shì xiàn zhì le tā men zhèng cháng de fā zhǎn. qí cì, jí shǐ shì chū yú jiào yù de mù de, yě qiān wàn bù néng piàn hái zi, yīn wèi ér tóng quē shǎo pàn duàn néng lì, kàn dào fù mǔ piàn rén, tā men yě huì xué zhe shuō jiǎ huà." },
"4_12_4": { "zh": "世界 上 有 那么多 的 考试，很多 考试 我们 无法 拒绝，不得不 参加，否则 我们 连 \"进门\" 的 机会 都 没有。但 只会 考试，没有 真正 的 知识 和 经验，就算 你 进了 门 也 看 不到 世界 的 精彩。", "es": "En el mundo hay tantos exámenes. Muchos de ellos no podemos rechazarlos y tenemos que hacerlos, porque de lo contrario ni siquiera tendremos la oportunidad de \"entrar por la puerta\". Pero si solo sabes hacer exámenes y no tienes verdaderos conocimientos ni experiencia, aunque entres por la puerta, tampoco podrás ver lo maravilloso del mundo.", "pinyin": "shì jiè shàng yǒu nà me duō de kǎo shì, hěn duō kǎo shì wǒ men wú fǎ jù jué, bù dé bù cān jiā, fǒu zé wǒ men lián \"jìn mén\" de jī huì dōu méi yǒu. dàn zhǐ huì kǎo shì, méi yǒu zhēn zhèng de zhī shi hé jīng yàn, jiù suàn nǐ jìn le mén yě kàn bú dào shì jiè de jīng cǎi." },

async function inicializarAudios() {
    let lista = AUDIO_FILES; 
    try {
        const resp = await fetch('audios/manifest.json', { cache: 'no-store' });
        if (resp.ok) {
            const datos = await resp.json();
            if (Array.isArray(datos) && datos.length > 0) {
                lista = datos;
            }
        }
    } catch (e) {
        // fallback
    }
    AUDIOS_DETECTADOS = lista.map(nombre => {
        const sinExtension = nombre.replace(/\.[a-zA-Z0-9]+$/, '');
        const partes = sinExtension.split('_');
        const comentario = partes.slice(3).join('_');
        return {
            file: null,
            filename: nombre,
            nivel: partes[0] || "1",
            leccion: partes[1] || "1",
            dialogo: partes[2] || "1",
            comentario: comentario,
            remoteUrl: 'audios/' + encodeURIComponent(nombre)
        };
    });
    if (AUDIOS_DETECTADOS.length > 0) {
        actualizarNiveles();
        audioInfoSpan.innerHTML = `✅ Estado: ${AUDIOS_DETECTADOS.length} audios disponibles en /audios.`;
    }
}

function actualizarNiveles() {
    const niveles = [...new Set(AUDIOS_DETECTADOS.map(a => a.nivel))].sort((a,b) => a-b);
    levelSelect.innerHTML = niveles.map(n => `<option value="${n}">HSK ${n}</option>`).join('');
    actualizarLecciones();
}

function actualizarLecciones() {
    const nivelSel = levelSelect.value;
    const lecciones = [...new Set(AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel).map(a => a.leccion))].sort((a,b) => a-b);
    lessonSelect.innerHTML = lecciones.map(l => `<option value="${l}">Lección ${l}</option>`).join('');
    updateAudioSelector();
}

function updateAudioSelector() {
    const n = levelSelect.value;
    const l = lessonSelect.value;
    const filtrados = AUDIOS_DETECTADOS.filter(a => a.nivel === n && a.leccion === l);
    audioSelect.innerHTML = filtrados.map(a => {
        const extra = a.comentario ? ` - ${a.comentario}` : '';
        return `<option value="${a.filename}">Diálogo ${a.dialogo}${extra} (${a.filename})</option>`;
    }).join('');
}

function loadSelectedAudio() {
    currentFilename = audioSelect.value;
    if (!currentFilename) return;
    const meta = AUDIOS_DETECTADOS.find(a => a.filename === currentFilename);
    if (!meta) return;

    if (activeRAF) cancelAnimationFrame(activeRAF);
    audioPlayer.pause();
    
    if (meta.remoteUrl) {
        audioPlayer.src = meta.remoteUrl;
    } else if (meta.file) {
        audioPlayer.src = URL.createObjectURL(meta.file);
    } else {
        return;
    }
    
    audioPlayer.onloadedmetadata = () => {
        const durReal = audioPlayer.duration;
        const idBusqueda = `${meta.nivel}_${meta.leccion}_${meta.dialogo}`;
        let data;
        if (transcripcionesDB[currentFilename]) {
            data = transcripcionesDB[currentFilename];
        } else if (HSK_DATA[idBusqueda]) {
            data = { chinoRaw: HSK_DATA[idBusqueda].zh.replace(/\n/g, ' '), traduccion: HSK_DATA[idBusqueda].es, pinyin: HSK_DATA[idBusqueda].pinyin || '', timings: [], duracion: durReal };
        } else {
            data = { chinoRaw: "Escribe la letra aquí", traduccion: "Traducción", pinyin: "", timings: [], duracion: durReal };
        }
        currentTokens = buildTokensFromRaw(data.chinoRaw, data.timings, durReal);
        currentTranslation = data.traduccion;
        currentPinyin = data.pinyin || '';
        audioInfoSpan.innerHTML = `🎵 2. Estado: Cargado ${currentFilename} ${meta.remoteUrl ? '(desde URL)' : '(local)'}`;
        renderTranscript();
    };
}

function buildTokensFromRaw(rawText, timingsArray, totalDur) {
    if (!rawText) return [];
    const words = rawText.split(/\s+/).filter(w => w.length > 0);
    const tokens = [];
    const dur = totalDur || (words.length * 0.5);
    for (let i = 0; i < words.length; i++) {
        let start = (timingsArray && timingsArray.length > i && timingsArray[i] !== undefined) ? timingsArray[i] : (i * (dur / words.length));
        let end = (timingsArray && timingsArray.length > i + 1) ? timingsArray[i+1] : (start + (dur / words.length));
        if (i === words.length - 1) end = dur;
        tokens.push({ word: words[i], start: parseFloat(start), end: parseFloat(end) });
    }
    return tokens;
}

function renderTranscript() {
    if (!currentTokens || currentTokens.length === 0) {
        transcriptContainer.innerHTML = `<div style="text-align:center;color:#94a3b8;padding:20px;">🎤 Haz clic en "Cargar audio" para empezar.</div>`;
        return;
    }
    let html = `<div id="karaokeContainer">`;
    let currentLineHtml = '<div class="dialogue-line">';
    const speakers = ['男', '女', 'A', 'B', '男1', '男2', '女1', '女2'];
    currentTokens.forEach((token, idx) => {
        const cleanWord = token.word.replace(/[:：]/g, '').trim();
        const isSpeaker = speakers.includes(cleanWord);
        if (isSpeaker && idx > 0) currentLineHtml += '</div><div class="dialogue-line">';
        const className = (isSpeaker || token.word.includes(':')) ? 'speaker-label' : 'karaoke-word';
        currentLineHtml += `<span class="${className}" id="w-${idx}">${escapeHtml(token.word)}</span> `;
    });
    currentLineHtml += '</div>';
    html += currentLineHtml + '</div>';
    if (showTranslation && currentTranslation) {
        html += `<div class="translation-container">`;
        currentTranslation.split('\n').forEach(line => {
            if (line.trim()) html += `<div class="translation-line">${escapeHtml(line)}</div>`;
        });
        html += `</div>`;
    }
    if (showPinyin && currentPinyin) {
        html += `<div class="translation-container" style="border-top-color: #a78bfa;">`;
        currentPinyin.split('\n').forEach(line => {
            if (line.trim()) html += `<div class="translation-line" style="color: #6b21a5;">${escapeHtml(line)}</div>`;
        });
        html += `</div>`;
    }
    transcriptContainer.innerHTML = html;
}

function startKaraokeSync() {
    if (activeRAF) cancelAnimationFrame(activeRAF);
    function sync() {
        if (!audioPlayer.paused && !audioPlayer.ended) {
            const time = audioPlayer.currentTime;
            currentTokens.forEach((t, i) => {
                const el = document.getElementById(`w-${i}`);
                if (el) {
                    if (time >= t.start && time < t.end) el.classList.add('active');
                    else el.classList.remove('active');
                }
            });
            activeRAF = requestAnimationFrame(sync);
        }
    }
    activeRAF = requestAnimationFrame(sync);
}

function forceSync() {
    if (!currentTokens.length || !audioPlayer.duration) return;
    const dur = audioPlayer.duration;
    const count = currentTokens.length;
    currentTokens.forEach((t, i) => {
        t.start = (i * dur) / count;
        t.end = ((i + 1) * dur) / count;
    });
    if (audioPlayer.paused) {
        const time = audioPlayer.currentTime;
        currentTokens.forEach((t, i) => {
            const el = document.getElementById(`w-${i}`);
            if (el) {
                if (time >= t.start && time < t.end) el.classList.add('active');
                else el.classList.remove('active');
            }
        });
    }
}

function showAdvancedEditor() {
    if (!currentFilename) return alert("Carga un audio primero");
    const currentChino = currentTokens.map(t => t.word).join(' ');
    const currentPinyinText = currentPinyin || '';
    const modalHtml = `
        <div id="modalEditor" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;">
            <div style="background:white;border-radius:28px;max-width:550px;width:100%;padding:24px;">
                <h3 style="margin-bottom:15px">✏️ Editor de Persistencia</h3>
                <textarea id="editChino" rows="5">${currentChino}</textarea>
                <textarea id="editPinyin" rows="3" style="margin-top:10px;">${currentPinyinText}</textarea>
                <textarea id="editTrad" rows="4" style="margin-top:10px;">${currentTranslation}</textarea>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button id="saveMdl" style="background:#22c55e; color:white; flex:1; border:none; padding:12px; border-radius:8px;">💾 Guardar</button>
                    <button onclick="document.getElementById('modalEditor').remove()" style="background:#e2e8f0; flex:1; border:none; padding:12px; border-radius:8px;">Cancelar</button>
                </div>
            </div>
        </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('saveMdl').onclick = () => {
        const raw = document.getElementById('editChino').value.trim();
        const trad = document.getElementById('editTrad').value.trim();
        const pinyin = document.getElementById('editPinyin').value.trim();
        const dur = audioPlayer.duration || 5;
        const words = raw.split(/\s+/).filter(w => w.length > 0);
        const autoTimings = words.map((_, i) => (i * dur / words.length));
        transcripcionesDB[currentFilename] = { chinoRaw: raw, traduccion: trad, pinyin: pinyin, timings: autoTimings, duracion: dur };
        guardarTranscripciones();
        document.getElementById('modalEditor').remove();
        loadSelectedAudio();
    };
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function toggleTranslation() {
    showTranslation = !showTranslation;
    toggleTranslationBtn.classList.toggle('active', showTranslation);
    renderTranscript();
}
function togglePinyin() {
    showPinyin = !showPinyin;
    togglePinyinBtn.classList.toggle('active', showPinyin);
    renderTranscript();
}

levelSelect.onchange = actualizarLecciones;
lessonSelect.onchange = updateAudioSelector;
document.getElementById('loadAudioBtn').onclick = loadSelectedAudio;
document.getElementById('showEditorBtn').onclick = showAdvancedEditor;
toggleTranslationBtn.onclick = toggleTranslation;
togglePinyinBtn.onclick = togglePinyin;
audioPlayer.onplay = startKaraokeSync;
syncFixBtn.onclick = forceSync;

cargarTranscripcionesGuardadas();
inicializarAudios();

let isPlayingAllLevel = false;
let currentLevelAudioIndex = 0;
let currentLevelAudios = [];

document.getElementById('playAllLevelCheck').addEventListener('change', function(e) {
    isPlayingAllLevel = e.target.checked;
    
    const randomBtn = document.getElementById('playRandomLevelBtn');
    const loopBtn = document.getElementById('playLoopLevelBtn');
    if (isPlayingAllLevel) {
        randomBtn.style.display = 'inline-flex';
        loopBtn.style.display = 'inline-flex';
    } else {
        randomBtn.style.display = 'none';
        loopBtn.style.display = 'none';
        isPlayingRandomLevel = false;
        isLoopingLevel = false;
    }
    
    if (isPlayingAllLevel) {
        const nivelSel = document.getElementById('levelSelect').value;
        if (!nivelSel) {
            this.checked = false;
            isPlayingAllLevel = false;
            randomBtn.style.display = 'none';
            loopBtn.style.display = 'none';
            return;
        }
        currentLevelAudios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel);
        if (currentLevelAudios.length > 0) {
            currentLevelAudioIndex = 0;
            isPlayingRandomLevel = false; 
            isLoopingLevel = false;
            playNextInLevel();
        } else {
            this.checked = false;
            isPlayingAllLevel = false;
            randomBtn.style.display = 'none';
            loopBtn.style.display = 'none';
        }
    }
});

function playNextInLevel() {
    if (!isPlayingAllLevel || currentLevelAudioIndex >= currentLevelAudios.length) {
        if (isLoopingLevel) {
            currentLevelAudioIndex = 0;
            playNextInLevel();
            return;
        }
        isPlayingAllLevel = false;
        document.getElementById('playAllLevelCheck').checked = false;
        document.getElementById('playRandomLevelBtn').style.display = 'none';
        document.getElementById('playLoopLevelBtn').style.display = 'none';
        return;
    }
    
    const nextAudio = currentLevelAudios[currentLevelAudioIndex];
    
    document.getElementById('lessonSelect').value = nextAudio.leccion;
    updateAudioSelector(); 
    document.getElementById('audioSelect').value = nextAudio.filename;
    
    loadSelectedAudio();
    
    const playHandler = function() {
        audioPlayer.play();
        audioPlayer.removeEventListener('loadedmetadata', playHandler);
    };
    audioPlayer.addEventListener('loadedmetadata', playHandler);
}

audioPlayer.addEventListener('ended', function() {
    if (isPlayingAllLevel) {
        currentLevelAudioIndex++;
        playNextInLevel();
    }
});

let isPlayingRandomLevel = false;
let currentRandomLevelAudios = [];
let currentRandomLevelAudioIndex = 0;

document.getElementById('playRandomLevelBtn').addEventListener('click', function() {
    const nivelSel = document.getElementById('levelSelect').value;
    if (!nivelSel) return;
    
    isPlayingAllLevel = false;
    isLoopingLevel = false;
    
    let audios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel);
    if (audios.length > 0) {
        for (let i = audios.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [audios[i], audios[j]] = [audios[j], audios[i]];
        }
        currentRandomLevelAudios = audios;
        currentRandomLevelAudioIndex = 0;
        isPlayingRandomLevel = true;
        playNextRandomInLevel();
    }
});

function playNextRandomInLevel() {
    if (!isPlayingRandomLevel || currentRandomLevelAudioIndex >= currentRandomLevelAudios.length) {
        if (isLoopingLevel) {
            currentRandomLevelAudioIndex = 0;
            playNextRandomInLevel();
            return;
        }
        isPlayingRandomLevel = false;
        return;
    }
    
    const nextAudio = currentRandomLevelAudios[currentRandomLevelAudioIndex];
    
    document.getElementById('lessonSelect').value = nextAudio.leccion;
    updateAudioSelector(); 
    document.getElementById('audioSelect').value = nextAudio.filename;
    
    loadSelectedAudio();
    
    const playHandler = function() {
        audioPlayer.play();
        audioPlayer.removeEventListener('loadedmetadata', playHandler);
    };
    audioPlayer.addEventListener('loadedmetadata', playHandler);
}

audioPlayer.addEventListener('ended', function() {
    if (isPlayingRandomLevel) {
        currentRandomLevelAudioIndex++;
        playNextRandomInLevel();
    }
});

let isPlayingAllLesson = false;
let currentLessonAudioIndex = 0;
let currentLessonAudios = [];

document.getElementById('playAllLessonCheck').addEventListener('change', function(e) {
    isPlayingAllLesson = e.target.checked;
    if (isPlayingAllLesson) {
        if (document.getElementById('playAllLevelCheck')) {
            document.getElementById('playAllLevelCheck').checked = false;
            isPlayingAllLevel = false;
        }
        isPlayingRandomLevel = false;
        isLoopingLevel = false;

        const nivelSel = document.getElementById('levelSelect').value;
        const leccionSel = document.getElementById('lessonSelect').value;
        if (!nivelSel || !leccionSel) {
            this.checked = false;
            isPlayingAllLesson = false;
            return;
        }
        currentLessonAudios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel && a.leccion === leccionSel);
        if (currentLessonAudios.length > 0) {
            currentLessonAudioIndex = 0;
            isLoopingLesson = false;
            playNextInLesson();
        } else {
            this.checked = false;
            isPlayingAllLesson = false;
        }
    }
});

function playNextInLesson() {
    if (!isPlayingAllLesson || currentLessonAudioIndex >= currentLessonAudios.length) {
        if (isLoopingLesson) {
            currentLessonAudioIndex = 0;
            playNextInLesson();
            return;
        }
        isPlayingAllLesson = false;
        document.getElementById('playAllLessonCheck').checked = false;
        return;
    }
    
    const nextAudio = currentLessonAudios[currentLessonAudioIndex];
    
    document.getElementById('audioSelect').value = nextAudio.filename;
    
    loadSelectedAudio();
    
    const playHandler = function() {
        audioPlayer.play();
        audioPlayer.removeEventListener('loadedmetadata', playHandler);
    };
    audioPlayer.addEventListener('loadedmetadata', playHandler);
}

audioPlayer.addEventListener('ended', function() {
    if (isPlayingAllLesson) {
        currentLessonAudioIndex++;
        playNextInLesson();
    }
});

let isPlayingRandomLesson = false;
let currentRandomLessonAudios = [];
let currentRandomLessonAudioIndex = 0;

document.getElementById('playAllLessonCheck').addEventListener('change', function() {
    const lessonRandomBtn = document.getElementById('playRandomLessonBtn');
    const lessonLoopBtn = document.getElementById('playLoopLessonBtn');
    if (this.checked) {
        lessonRandomBtn.style.display = 'inline-flex';
        lessonLoopBtn.style.display = 'inline-flex';
    } else {
        lessonRandomBtn.style.display = 'none';
        lessonLoopBtn.style.display = 'none';
        isPlayingRandomLesson = false;
        isLoopingLesson = false;
    }
});

document.getElementById('playRandomLessonBtn').addEventListener('click', function() {
    const nivelSel = document.getElementById('levelSelect').value;
    const leccionSel = document.getElementById('lessonSelect').value;

    if (!nivelSel || !leccionSel) return;

    isPlayingAllLesson = false;
    isLoopingLesson = false;

    let audios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel && a.leccion === leccionSel);

    if (audios.length > 0) {
        for (let i = audios.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [audios[i], audios[j]] = [audios[j], audios[i]];
        }

        currentRandomLessonAudios = audios;
        currentRandomLessonAudioIndex = 0;
        isPlayingRandomLesson = true;

        playNextRandomInLesson();
    }
});

function playNextRandomInLesson() {
    if (!isPlayingRandomLesson || currentRandomLessonAudioIndex >= currentRandomLessonAudios.length) {
        if (isLoopingLesson) {
            currentRandomLessonAudioIndex = 0;
            playNextRandomInLesson();
            return;
        }
        isPlayingRandomLesson = false;
        return;
    }

    const nextAudio = currentRandomLessonAudios[currentRandomLessonAudioIndex];

    document.getElementById('audioSelect').value = nextAudio.filename;

    loadSelectedAudio();

    const playHandler = function() {
        audioPlayer.play();
        audioPlayer.removeEventListener('loadedmetadata', playHandler);
    };

    audioPlayer.addEventListener('loadedmetadata', playHandler);
}

audioPlayer.addEventListener('ended', function() {
    if (isPlayingRandomLesson) {
        currentRandomLessonAudioIndex++;
        playNextRandomInLesson();
    }
});

let isLoopingLevel = false;
let isLoopingLesson = false;

document.getElementById('playLoopLevelBtn').addEventListener('click', function() {
    const nivelSel = document.getElementById('levelSelect').value;
    if (!nivelSel) return;
    
    isLoopingLevel = !isLoopingLevel;
    this.style.background = isLoopingLevel ? '#059669' : '#10b981';
    
    if (isLoopingLevel) {
        isPlayingAllLevel = true;
        document.getElementById('playAllLevelCheck').checked = true;
        isPlayingRandomLevel = false;
        currentLevelAudios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel);
        if (currentLevelAudios.length > 0) {
            currentLevelAudioIndex = 0;
            playNextInLevel();
        }
    }
});

document.getElementById('playLoopLessonBtn').addEventListener('click', function() {
    const nivelSel = document.getElementById('levelSelect').value;
    const leccionSel = document.getElementById('lessonSelect').value;
    if (!nivelSel || !leccionSel) return;
    
    isLoopingLesson = !isLoopingLesson;
    this.style.background = isLoopingLesson ? '#059669' : '#10b981';
    
    if (isLoopingLesson) {
        isPlayingAllLesson = true;
        document.getElementById('playAllLessonCheck').checked = true;
        isPlayingRandomLesson = false;
        currentLessonAudios = AUDIOS_DETECTADOS.filter(a => a.nivel === nivelSel && a.leccion === leccionSel);
        if (currentLessonAudios.length > 0) {
            currentLessonAudioIndex = 0;
            playNextInLesson();
        }
    }
});
